<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#007aff">
<title>vincle.chat · Conecta con personas reales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #f0f2f5 100%);
  padding-bottom: 100px;
  color: #1c1c1e;
  min-height: 100vh;
}

/* Custom scroll */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
::-webkit-scrollbar-track {
  background: #e5e5ea;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: #007aff;
  border-radius: 10px;
}

/* Header premium */
header {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 20px 20px;
}

.header-main {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.header-main .logo {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #007aff, #5856d6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.header-main .emoji {
  font-size: 2rem;
}

.header-subtitle {
  text-align: center;
  font-size: 0.9rem;
  color: #8e8e93;
  margin-top: 8px;
  font-weight: 500;
  letter-spacing: 0.3px;
}

/* Stats bar premium */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 16px 20px;
  background: white;
  margin: 16px 20px;
  border-radius: 80px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  backdrop-filter: blur(10px);
}

.stat-item {
  text-align: center;
  position: relative;
}

.stat-item:not(:last-child)::after {
  content: '';
  position: absolute;
  right: -16px;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 30px;
  background: #e5e5ea;
}

.stat-value {
  font-weight: 800;
  font-size: 1.5rem;
  background: linear-gradient(135deg, #007aff, #5856d6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.stat-label {
  font-size: 0.7rem;
  color: #8e8e93;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
  margin-top: 4px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

/* Grid cards premium */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 24px;
  padding: 20px 24px;
}

.card {
  background: white;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(0,0,0,0.08);
  transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 20px 40px -12px rgba(0,0,0,0.25);
}

.card-image-wrapper {
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.card img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.card:hover img {
  transform: scale(1.08);
}

.like-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  padding: 6px 14px;
  border-radius: 40px;
  color: white;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  z-index: 2;
  letter-spacing: -0.2px;
}

.like-badge::before {
  content: '❤️';
  font-size: 14px;
}

.card-content {
  padding: 20px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}

.card-header h3 {
  font-size: 1.3rem;
  font-weight: 700;
  color: #1c1c1e;
  letter-spacing: -0.3px;
}

.age-tag {
  background: #f2f2f7;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  color: #007aff;
}

.info-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 12px 0;
  font-size: 0.85rem;
  color: #5c5c5e;
  flex-wrap: wrap;
}

.info-row span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.creator-badge {
  background: #f2f2f7;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  color: #8e8e93;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 10px;
}

.desc-text {
  font-size: 0.85rem;
  color: #6c6c6e;
  line-height: 1.5;
  margin: 12px 0;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.tags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 14px 0;
}

.tag {
  background: linear-gradient(135deg, #f2f2f7, #e5e5ea);
  padding: 5px 14px;
  border-radius: 24px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #007aff;
  letter-spacing: -0.2px;
}

.date-info {
  font-size: 0.65rem;
  color: #aaa;
  margin: 8px 0 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.buttons-group {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}

.btn {
  flex: 1;
  border: none;
  border-radius: 44px;
  padding: 12px;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}

.btn-like {
  background: linear-gradient(135deg, #ff3b30, #ff6b58);
  color: white;
  box-shadow: 0 2px 8px rgba(255,59,48,0.2);
}

.btn-like:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(255,59,48,0.35);
}

.btn-wa {
  background: #25d366;
  color: white;
  box-shadow: 0 2px 8px rgba(37,211,102,0.2);
}

.btn-wa:hover {
  background: #1da15b;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(37,211,102,0.3);
}

.btn-wa:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* FAB mejorado */
.fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: linear-gradient(135deg, #007aff, #5856d6);
  color: white;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  font-size: 34px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(0,122,255,0.4);
  transition: all 0.3s ease;
  z-index: 99;
  border: none;
  font-weight: 300;
}

.fab:hover {
  transform: scale(1.08) rotate(90deg);
  box-shadow: 0 12px 32px rgba(0,122,255,0.5);
}

/* Modal premium */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(16px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  padding: 20px;
}

.modal-content {
  background: white;
  border-radius: 48px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  animation: modalSlideIn 0.35s ease;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
}

@keyframes modalSlideIn {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.96);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

.modal-content h2 {
  text-align: center;
  margin-bottom: 24px;
  font-size: 1.8rem;
  background: linear-gradient(135deg, #007aff, #5856d6);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 700;
}

.modal-content input,
.modal-content textarea {
  width: 100%;
  margin-bottom: 14px;
  padding: 14px 18px;
  border-radius: 28px;
  border: 1.5px solid #e5e5ea;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s;
  background: #f9f9fb;
}

.modal-content input:focus,
.modal-content textarea:focus {
  border-color: #007aff;
  outline: none;
  background: white;
  box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
}

.modal-content textarea {
  min-height: 100px;
  resize: vertical;
}

.modal-buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.modal-buttons button {
  flex: 1;
  padding: 14px;
  border-radius: 44px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s;
}

.btn-primary {
  background: linear-gradient(135deg, #007aff, #5856d6);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,122,255,0.3);
}

.btn-secondary {
  background: #e5e5ea;
  color: #1c1c1e;
}

.btn-secondary:hover {
  background: #d1d1d6;
}

/* Toast notification */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(16px);
  color: white;
  padding: 14px 28px;
  border-radius: 60px;
  font-size: 14px;
  font-weight: 500;
  z-index: 150;
  animation: toastFade 2.8s ease forwards;
  pointer-events: none;
  letter-spacing: 0.2px;
  white-space: nowrap;
}

@keyframes toastFade {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
  15% { opacity: 1; transform: translateX(-50%) translateY(0); }
  85% { opacity: 1; transform: translateX(-50%) translateY(0); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
}

.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 28px;
  height: 400px;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.empty-state {
  text-align: center;
  padding: 100px 20px;
  color: #8e8e93;
}

.empty-state-icon {
  font-size: 72px;
  margin-bottom: 20px;
  opacity: 0.6;
}

.empty-state h3 {
  font-size: 1.3rem;
  margin-bottom: 8px;
  color: #1c1c1e;
}

@media (max-width: 768px) {
  .grid {
    grid-template-columns: 1fr;
    gap: 20px;
    padding: 16px;
  }
  .stats-bar {
    margin: 12px 16px;
    gap: 20px;
  }
  .stat-item:not(:last-child)::after {
    right: -10px;
  }
  .fab {
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    font-size: 30px;
  }
  .modal-content {
    padding: 24px;
    margin: 16px;
  }
  .toast {
    white-space: normal;
    text-align: center;
    max-width: 85%;
    font-size: 13px;
  }
}

@media (max-width: 480px) {
  .card-header h3 {
    font-size: 1.1rem;
  }
  .buttons-group {
    flex-direction: column;
  }
}
</style>
</head>
<body>

<header>
  <div class="header-main">
    <span class="emoji"><svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://w3.org">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <path d="M25 25L50 85L75 25" fill="url(#grad1)" />
</svg></span>
    <span class="logo">vincle.chat</span>
  </div>
  <div class="header-subtitle">
    Presenta a tu amig@ ✨
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="statTotal">0</div>
    <div class="stat-label">Personas</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="statLikes">0</div>
    <div class="stat-label">Likes totales</div>
  </div>
</div>

<div class="container">
  <div id="profiles" class="grid"></div>
</div>

<button class="fab" id="fabBtn">+</button>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>✨ Presenta a tu amig@ ✨</h2>
    <input id="creator" placeholder="Tu nombre *" autocomplete="off">
    <input id="name" placeholder="Nombre de tu amig@ *" autocomplete="off">
    <input id="age" placeholder="Edad" type="number" autocomplete="off">
    <input id="height" placeholder="Altura (cm)" type="number" autocomplete="off">
    <input id="location" placeholder="Ubicación" autocomplete="off">
    <input id="phone" placeholder="WhatsApp (ej: 34600000000)" autocomplete="off">
    <input id="photo" placeholder="URL de foto (opcional)" autocomplete="off">
    <textarea id="desc" placeholder="Describe a tu amig@, hobbies, personalidad..."></textarea>
    <input id="tags" placeholder="Tags: deporte,música,viajes" autocomplete="off">
    <div class="modal-buttons">
      <button class="btn-primary" id="publishBtn">📢 Publicar</button>
      <button class="btn-secondary" id="closeModalBtn">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment, query, orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
  apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",
  authDomain: "vinclechat-564d1.firebaseapp.com",
  projectId: "vinclechat-564d1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// User ID para control de likes
let userId = localStorage.getItem("vincle_user");
if (!userId) {
  userId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36);
  localStorage.setItem("vincle_user", userId);
}

// DOM elements
const profilesDiv = document.getElementById("profiles");
const modal = document.getElementById("modal");
const statTotal = document.getElementById("statTotal");
const statLikes = document.getElementById("statLikes");

const creatorInput = document.getElementById("creator");
const nameInput = document.getElementById("name");
const ageInput = document.getElementById("age");
const heightInput = document.getElementById("height");
const locationInput = document.getElementById("location");
const phoneInput = document.getElementById("phone");
const photoInput = document.getElementById("photo");
const descInput = document.getElementById("desc");
const tagsInput = document.getElementById("tags");

let allProfiles = [];
let unsubscribeSnapshot = null;

// Toast notification
function showToast(message, isError = false) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  toast.style.background = isError ? 'rgba(255,59,48,0.95)' : 'rgba(0,0,0,0.85)';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
}

// Modal controls
function openModal() { modal.style.display = 'flex'; }
function closeModal() { modal.style.display = 'none'; }

// Add profile
async function addProfile() {
  const creator = creatorInput.value.trim();
  const name = nameInput.value.trim();
  if (!creator || !name) {
    showToast("❌ Completa 'Tu nombre' y 'Nombre'", true);
    return;
  }

  let phone = phoneInput.value.trim();
  if (phone && !phone.startsWith("+") && !phone.startsWith("34") && /^\d+$/.test(phone)) {
    phone = "34" + phone;
  }

  const data = {
    creator, name,
    age: ageInput.value ? parseInt(ageInput.value) : null,
    height: heightInput.value ? parseInt(heightInput.value) : null,
    location: locationInput.value.trim() || null,
    phone: phone || null,
    photo: photoInput.value.trim() || "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400",
    desc: descInput.value.trim() || null,
    tags: tagsInput.value.trim() ? tagsInput.value.split(",").map(t => t.trim()).filter(t => t) : [],
    likes: 0,
    likedBy: [],
    createdAt: Date.now()
  };

  try {
    await addDoc(collection(db, "profiles"), data);
    closeModal();
    [creatorInput, nameInput, ageInput, heightInput, locationInput, phoneInput, photoInput, descInput, tagsInput].forEach(i => i.value = "");
    showToast("✨ ¡Perfil publicado con éxito!");
  } catch (err) {
    console.error(err);
    showToast("Error al publicar: " + err.message, true);
  }
}

// Like profile
async function likeProfile(id, currentLikedBy) {
  if (currentLikedBy.includes(userId)) {
    showToast("💛 Ya apoyaste a esta persona");
    return;
  }
  try {
    await updateDoc(doc(db, "profiles", id), {
      likes: increment(1),
      likedBy: [...currentLikedBy, userId]
    });
    showToast("❤️ ¡Gracias por apoyar!");
  } catch (err) {
    showToast("Error al dar like", true);
  }
}

// Update stats
function updateStats(profiles) {
  statTotal.textContent = profiles.length;
  const totalLikes = profiles.reduce((sum, p) => sum + (p.likes || 0), 0);
  statLikes.textContent = totalLikes;
}

function formatDate(timestamp) {
  if (!timestamp) return '';
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  if (days === 0) return 'Hoy';
  if (days === 1) return 'Ayer';
  if (days < 7) return `Hace ${days} días`;
  return date.toLocaleDateString();
}

// Escape HTML
function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

// Render profiles (sin filtros)
function renderProfiles() {
  if (!profilesDiv) return;
  updateStats(allProfiles);

  if (allProfiles.length === 0) {
    profilesDiv.innerHTML = `<div class="empty-state"><div class="empty-state-icon">💫</div><h3>No hay perfiles aún</h3><div>¡Sé el primero en publicar!</div></div>`;
    return;
  }

  profilesDiv.innerHTML = "";
  for (const p of allProfiles) {
    const card = document.createElement("div");
    card.className = "card";

    const imgUrl = p.photo?.startsWith("http") ? p.photo : "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400";
    const ageText = p.age ? `${p.age} años` : "? años";
    const heightText = p.height ? `${p.height} cm` : "";
    const locationText = p.location || "📍 Ubicación no especificada";
    const whatsappLink = p.phone ? `https://wa.me/${p.phone.replace(/[^0-9+]/g, '')}?text=Hola!%20Vi%20el%20perfil%20de%20${encodeURIComponent(p.name)}%20en%20vincle.chat%20y%20me%20gustaría%20conocerte%20😊` : null;

    const tagsHtml = p.tags?.length ? 
      `<div class="tags-container">${p.tags.slice(0,4).map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join('')}</div>` : "";

    card.innerHTML = `
      <div class="card-image-wrapper">
        <img src="${imgUrl}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400'">
        <div class="like-badge">${p.likes || 0}</div>
      </div>
      <div class="card-content">
        <div class="creator-badge">
          👤 Publicado por: ${escapeHtml(p.creator)}
        </div>
        <div class="card-header">
          <h3>${escapeHtml(p.name)}</h3>
          <span class="age-tag">${ageText}</span>
        </div>
        <div class="info-row">
          <span>📍 ${escapeHtml(locationText)}</span>
          ${heightText ? `<span>📏 ${heightText}</span>` : ""}
        </div>
        ${p.desc ? `<div class="desc-text">📝 ${escapeHtml(p.desc)}</div>` : ""}
        ${tagsHtml}
        <div class="date-info">
          🕒 ${p.createdAt ? formatDate(p.createdAt) : 'Reciente'}
        </div>
        <div class="buttons-group">
          <button class="btn btn-like like-btn" data-id="${p.id}" data-likedby='${JSON.stringify(p.likedBy || [])}'>❤️ Me interesa</button>
          ${whatsappLink ? `<a href="${whatsappLink}" target="_blank" rel="noopener noreferrer" style="flex:1"><button class="btn btn-wa">💬 WhatsApp</button></a>` : '<button class="btn btn-wa" disabled>📱 Sin WhatsApp</button>'}
        </div>
      </div>
    `;

    const likeBtn = card.querySelector('.like-btn');
    likeBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      let likedByArr = [];
      try { likedByArr = JSON.parse(likeBtn.getAttribute('data-likedby')); } catch(e) {}
      likeProfile(p.id, likedByArr);
    });

    profilesDiv.appendChild(card);
  }
}

// Real-time listener
function startRealtimeListener() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const q = query(collection(db, "profiles"), orderBy("createdAt", "desc"));
  
  // Show skeleton loading
  profilesDiv.innerHTML = `
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  `;
  
  unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
    allProfiles = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
    renderProfiles();
  }, (error) => {
    console.error("Firestore error:", error);
    profilesDiv.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Error de conexión</h3><div>Verifica las reglas de Firestore</div></div>`;
    showToast("Error al conectar con la base de datos", true);
  });
}

// Init
function init() {
  startRealtimeListener();
  
  document.getElementById("fabBtn").onclick = openModal;
  document.getElementById("closeModalBtn").onclick = closeModal;
  document.getElementById("publishBtn").onclick = addProfile;
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}

document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
</script>
</body>
</html>
