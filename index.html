<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  increment,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

// ========== 🔥 CONFIGURACIÓN DE FIREBASE ==========
const firebaseConfig = {
  apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",      // <--- CAMBIA ESTO
  authDomain: "vinclechat-564d1.firebaseapp.com",           // <--- CAMBIA ESTO
  projectId: "vinclechat-564d1"                             // <--- CAMBIA ESTO
};
// ===========================================================================

// Inicializar Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Evitar mostrar aviso varias veces
const hasSeenFirebaseWarning = sessionStorage.getItem("vincle_firebase_warning");

// ID de usuario local para control de likes
let userId = localStorage.getItem("vincle_user");
if (!userId) {
  userId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36);
  localStorage.setItem("vincle_user", userId);
}

// Elementos del DOM
const profilesDiv = document.getElementById("profiles");
const modal = document.getElementById("modal");
const fLocation = document.getElementById("fLocation");
const fAge = document.getElementById("fAge");
const fHeight = document.getElementById("fHeight");

// Campos del formulario
const creatorInput = document.getElementById("creator");
const nameInput = document.getElementById("name");
const ageInput = document.getElementById("age");
const heightInput = document.getElementById("height");
const locationInput = document.getElementById("location");
const phoneInput = document.getElementById("phone");
const photoInput = document.getElementById("photo");
const descInput = document.getElementById("desc");
const tagsInput = document.getElementById("tags");

// Variables reactivas para datos y filtros
let allProfiles = [];
let unsubscribeSnapshot = null;

// ===================== FUNCIONES UI =====================
window.openForm = () => modal.style.display = "flex";
window.closeForm = () => modal.style.display = "none";

// ===================== AGREGAR PERFIL =====================
window.addProfile = async () => {
  const creator = creatorInput.value.trim();
  const name = nameInput.value.trim();
  const age = parseInt(ageInput.value);
  const height = parseInt(heightInput.value);
  const location = locationInput.value.trim();
  let phone = phoneInput.value.trim();
  const photo = photoInput.value.trim() || "https://placehold.co/400x300?text=Sin+foto";
  const desc = descInput.value.trim();
  const tagsRaw = tagsInput.value.trim();

  if (!creator || !name) return alert("❌ Completa al menos 'Tu nombre' y 'Nombre'");

  if (phone && !phone.startsWith("+") && !phone.startsWith("34") && /^\d+$/.test(phone)) {
    phone = "34" + phone;
  }

  const data = {
    creator, name,
    age: isNaN(age) ? null : age,
    height: isNaN(height) ? null : height,
    location: location || null,
    phone: phone || null,
    photo, desc: desc || null,
    tags: tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(t => t) : [],
    likes: 0,
    likedBy: [],
    createdAt: Date.now()
  };

  try {
    await addDoc(collection(db, "profiles"), data);
    closeForm();
    creatorInput.value = nameInput.value = ageInput.value = heightInput.value = locationInput.value = phoneInput.value = photoInput.value = descInput.value = tagsInput.value = "";
  } catch (err) {
    console.error(err);
    alert("Error al publicar: " + err.message);
  }
};

// ===================== LIKE =====================
window.likeProfile = async (id, currentLikedBy = []) => {
  if (currentLikedBy.includes(userId)) return alert("💛 Ya apoyaste a esta persona");
  try {
    await updateDoc(doc(db, "profiles", id), {
      likes: increment(1),
      likedBy: [...currentLikedBy, userId]
    });
  } catch (err) {
    console.error(err);
    alert("No se pudo enviar el like");
  }
};

// ===================== FILTROS =====================
function applyFilters(profilesArray) {
  const locFilter = fLocation.value.trim().toLowerCase();
  const ageMax = fAge.value ? parseInt(fAge.value) : null;
  const heightMin = fHeight.value ? parseInt(fHeight.value) : null;

  return profilesArray.filter(p => {
    if (locFilter && (!p.location || !p.location.toLowerCase().includes(locFilter))) return false;
    if (ageMax !== null && (p.age && p.age > ageMax)) return false;
    if (heightMin !== null && (p.height && p.height < heightMin)) return false;
    return true;
  });
}

// ===================== RENDER =====================
function renderProfiles() {
  if (!profilesDiv) return;
  const filtered = applyFilters(allProfiles);

  if (filtered.length === 0) {
    profilesDiv.innerHTML = `<div class="empty-state">🙈 No hay perfiles que coincidan.<br>¡Sé el primero en publicar!</div>`;
    return;
  }

  profilesDiv.innerHTML = "";
  for (const p of filtered) {
    const card = document.createElement("div");
    card.className = "card";

    const imgUrl = p.photo.startsWith("http") ? p.photo : "https://placehold.co/400x300?text=Perfil";
    const ageText = p.age ? `${p.age} años` : "? años";
    const heightText = p.height ? `${p.height} cm` : "";
    const locationText = p.location || "🌍 Sin ubicación";
    const likesCount = p.likes || 0;
    const likedByArray = p.likedBy || [];
    const whatsappLink = p.phone ? `https://wa.me/${p.phone.replace(/[^0-9+]/g,'')}?text=Hola!%20Vi%20tu%20perfil%20en%20vincle.chat%20y%20me%20interesa%20conocerte%20😊` : null;

    const descHtml = p.desc ? `<div style="font-size:12px;color:#666;margin-top:4px;">📝 ${p.desc.substring(0,70)}${p.desc.length>70?'…':''}</div>` : "";
    const tagsHtml = p.tags && p.tags.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin:8px 0 4px;">${p.tags.slice(0,3).map(tag => `<span style="background:#e9e9ef;padding:2px 8px;border-radius:20px;font-size:11px;">#${tag}</span>`).join('')}</div>` : "";

    const lastUpdate = p.createdAt ? `<div style="font-size:10px;color:#aaa;margin-top:2px;">🕒 ${new Date(p.createdAt).toLocaleString()}</div>` : "";

    card.innerHTML = `
      <img src="${imgUrl}" alt="${p.name}" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=Error+carga'">
      <div class="card-content">
        <div><b>${escapeHtml(p.name)}</b> <span style="color:#666;">(${ageText})</span></div>
        <div>📍 ${escapeHtml(locationText)}</div>
        ${heightText ? `<div>📏 ${heightText}</div>` : ""}
        <div class="like-count">❤️ ${likesCount}</div>
        ${descHtml}
        ${tagsHtml}
        ${lastUpdate}
        <button class="like" data-id="${p.id}" data-likedby='${JSON.stringify(likedByArray)}'>💌 Me interesa</button>
        ${whatsappLink ? `<a href="${whatsappLink}" target="_blank" rel="noopener noreferrer"><button class="whatsapp">💬 WhatsApp</button></a>` : ""}
      </div>
    `;

    const likeBtn = card.querySelector('.like');
    likeBtn?.addEventListener('click', () => {
      let likedByArr = [];
      try { likedByArr = JSON.parse(likeBtn.getAttribute('data-likedby')); } catch(e){}
      window.likeProfile(p.id, likedByArr);
    });

    profilesDiv.appendChild(card);
  }
}

// ===================== HELPER =====================
function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
}

// ===================== LISTENER FIRESTORE =====================
function startRealtimeListener() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  const q = query(collection(db,"profiles"), orderBy("createdAt","desc"));
  unsubscribeSnapshot = onSnapshot(q, snapshot => {
    allProfiles = snapshot.docs.map(docSnap => ({id: docSnap.id, ...docSnap.data()}));
    renderProfiles();
  }, error => {
    console.error("Error en snapshot:", error);
    profilesDiv.innerHTML = `<div class="empty-state">⚠️ Error de conexión con Firebase.<br>Revisa tu configuración.</div>`;
  });
}

// ===================== FILTROS INPUT =====================
function bindFilters() {
  const update = () => renderProfiles();
  fLocation.addEventListener("input", update);
  fAge.addEventListener("input", update);
  fHeight.addEventListener("input", update);
}

// ===================== INICIALIZACIÓN =====================
function init() {
  bindFilters();
  startRealtimeListener();

  // Aviso de Firebase útil solo una vez por sesión
  if (!hasSeenFirebaseWarning && firebaseConfig.apiKey.includes("AIzaSy")) {
    sessionStorage.setItem("vincle_firebase_warning", "1");
    setTimeout(() => {
      if (confirm("⚠️ Tu proyecto Firebase parece no estar configurado.\n¿Quieres abrir la consola de Firebase para obtener tus credenciales?")) {
        window.open("https://console.firebase.google.com/", "_blank");
      }
    }, 500);
  }
}

document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
</script>
