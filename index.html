<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Vincle Prototype</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
    }
    button {
      padding: 10px 15px;
      cursor: pointer;
    }
    .card {
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="creator">
  <h2>Crear propuesta</h2>
  <input id="title" placeholder="Título">
  <textarea id="desc" placeholder="Descripción"></textarea>
  <input id="price" placeholder="Precio (€)">
  <input id="paylink" placeholder="Link de pago (Stripe, etc)">
  <button onclick="generate()">Generar link</button>

  <p id="result"></p>
</div>

<div id="viewer" class="hidden">
  <div class="card">
    <h2 id="v_title"></h2>
    <p id="v_desc"></p>
    <h3 id="v_price"></h3>

    <button onclick="accept()">Aceptar</button>
    <br><br>
    <a id="v_pay" target="_blank">
      <button>Pagar</button>
    </a>
  </div>
</div>

<script>
function generate() {
  const data = {
    title: document.getElementById("title").value,
    desc: document.getElementById("desc").value,
    price: document.getElementById("price").value,
    paylink: document.getElementById("paylink").value
  };

  const encoded = btoa(JSON.stringify(data));
  const url = location.origin + location.pathname + "#" + encoded;

  document.getElementById("result").innerHTML =
    'Tu link: <a href="' + url + '">' + url + '</a>';
}

function load() {
  if (location.hash.length > 1) {
    const data = JSON.parse(atob(location.hash.substring(1)));

    document.getElementById("creator").classList.add("hidden");
    document.getElementById("viewer").classList.remove("hidden");

    document.getElementById("v_title").innerText = data.title;
    document.getElementById("v_desc").innerText = data.desc;
    document.getElementById("v_price").innerText = data.price + "€";
    document.getElementById("v_pay").href = data.paylink;
  }
}

function accept() {
  alert("Propuesta aceptada (simulación)");
}

load();
</script>

</body>
</html>
