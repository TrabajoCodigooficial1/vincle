<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Vincle.chat · Reflexiones que conectan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      color: #0a1c2f;
      line-height: 1.5;
    }

    .app-container {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background: rgba(255,255,255,0.98);
      border-bottom: 1px solid #eef2f8;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo-area {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #183c4f, #2c6e8f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo span {
      font-weight: 500;
      font-size: 0.85rem;
      color: #5c6f87;
    }

    .tagline {
      font-size: 0.75rem;
      color: #5e7a93;
      border-left: 1px solid #dce5ef;
      padding-left: 0.8rem;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 15px;
      background: #f0f4fa;
      padding: 6px 20px 6px 14px;
      border-radius: 60px;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: #1e3b4a;
      border-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .user-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .edit-name-btn {
      background: none;
      border: none;
      font-size: 0.75rem;
      color: #4f7a9e;
      cursor: pointer;
    }

    .main-feed {
      flex: 1;
      padding: 2rem 2rem;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2.5rem;
    }

    @media (max-width: 880px) {
      .main-feed {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
    }

    .posts-section {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .post-card {
      background: white;
      border-radius: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04), 0 0 0 1px #eef3fc;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .post-card:hover {
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.06);
      transform: translateY(-2px);
    }

    .post-header {
      padding: 1.2rem 1.5rem 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      background: #dce5f0;
      border-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: #1f4662;
      flex-shrink: 0;
    }

    .post-user-info {
      flex: 1;
    }

    .post-user-name {
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .post-category {
      background: #eef3fc;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #22668d;
    }

    .post-time {
      font-size: 0.7rem;
      color: #7c8ba0;
      margin-top: 4px;
    }

    .post-content {
      padding: 0.5rem 1.5rem 1.2rem 1.5rem;
    }

    .post-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.6rem 0 0.8rem 0;
      letter-spacing: -0.3px;
    }

    .post-text {
      color: #1f2e45;
      font-size: 1rem;
      margin: 0.8rem 0;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .post-media {
      margin: 1rem 0;
      border-radius: 24px;
      overflow: hidden;
      max-height: 460px;
      display: flex;
      justify-content: center;
      background: #f2f6fb;
    }

    .post-media img {
      max-width: 100%;
      max-height: 400px;
      object-fit: contain;
    }

    .post-actions {
      padding: 0.8rem 1.5rem 1.2rem 1.5rem;
      border-top: 1px solid #eff3fa;
      display: flex;
      gap: 2rem;
    }

    .action-btn {
      background: none;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #546e86;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 40px;
    }

    .action-btn:hover {
      background: #f0f4fa;
      color: #1a4c6e;
    }

    .create-card {
      background: white;
      border-radius: 36px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02), 0 0 0 1px #eef3fc;
      cursor: pointer;
      transition: all 0.2s;
    }

    .create-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .create-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mini-avatar {
      width: 46px;
      height: 46px;
      background: #1e3b4a;
      border-radius: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    .fake-input {
      flex: 1;
      background: #f3f6fc;
      border-radius: 60px;
      padding: 14px 22px;
      color: #5f7f9a;
      font-size: 0.95rem;
    }

    .pagination-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    .page-btn {
      background: white;
      border: 1px solid #e2e9f2;
      padding: 10px 18px;
      border-radius: 50px;
      font-weight: 500;
      cursor: pointer;
    }

    .page-btn.active {
      background: #1e4c66;
      color: white;
      border-color: #1e4c66;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 28, 47, 0.75);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-container {
      background: white;
      width: 90%;
      max-width: 580px;
      border-radius: 44px;
      padding: 2rem;
    }

    .hidden {
      display: none;
    }

    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a2c3f;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-size: 0.85rem;
      z-index: 1200;
    }

    .sidebar-card {
      background: white;
      border-radius: 32px;
      padding: 1.6rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.02), 0 0 0 1px #edf2f9;
      margin-bottom: 1.8rem;
    }

    .sidebar-title {
      font-weight: 700;
      margin-bottom: 1.2rem;
      border-left: 4px solid #2c6e8f;
      padding-left: 14px;
    }

    .topic-chip {
      display: inline-block;
      background: #eef2fa;
      border-radius: 40px;
      padding: 6px 18px;
      margin: 6px 6px 0 0;
      font-size: 0.75rem;
    }

    .creator-item {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    input, textarea {
      font-family: 'Inter', sans-serif;
      border: 1px solid #e2e9f2;
      border-radius: 24px;
      padding: 12px 18px;
      width: 100%;
      font-size: 0.95rem;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #2c6e8f;
    }

    .btn-primary-solid {
      background: #1e4c66;
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }

    .loading-spinner {
      text-align: center;
      padding: 3rem;
      color: #6c86a3;
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem;
      border-radius: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="header">
    <div class="logo-area">
      <div class="logo">Vincle<span>.chat</span></div>
      <div class="tagline">ideas · intelecto · comunidad</div>
    </div>
    <div class="user-profile" id="userProfileBar">
      <div class="user-avatar" id="userAvatar">V</div>
      <div>
        <div class="user-name" id="displayNameText">Pensador</div>
        <button id="editProfileBtn" class="edit-name-btn"><i class="fas fa-pen"></i> nombre</button>
      </div>
    </div>
  </header>

  <div class="main-feed">
    <div class="posts-section">
      <div class="create-card" id="openCreatorBtn">
        <div class="create-header">
          <div class="mini-avatar" id="miniAvatar">V</div>
          <div class="fake-input"><i class="fas fa-feather-alt"></i> Comparte una reflexión, idea o aprendizaje...</div>
        </div>
      </div>

      <div id="postsFeedContainer">
        <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Conectando con Vincle...</div>
      </div>

      <div id="paginationControls" class="pagination-container"></div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title"><i class="fas fa-brain"></i> Tópicos</div>
        <div>
          <span class="topic-chip">#filosofía</span>
          <span class="topic-chip">#neurociencia</span>
          <span class="topic-chip">#creatividad</span>
          <span class="topic-chip">#ética</span>
          <span class="topic-chip">#aprendizaje</span>
        </div>
      </div>
      <div class="sidebar-card">
        <div class="sidebar-title"><i class="fas fa-fire"></i> Mentes activas</div>
        <div id="topLocalCreators">Cargando...</div>
      </div>
    </aside>
  </div>
</div>

<!-- MODAL CREAR -->
<div id="createModal" class="modal-overlay hidden">
  <div class="modal-container">
    <h3 style="margin-bottom: 1.2rem;"><i class="fas fa-lightbulb"></i> Nueva reflexión</h3>
    <input type="text" id="modalTitle" placeholder="Título (opcional)" style="margin-bottom: 14px;">
    <textarea id="modalBody" rows="4" placeholder="Escribe tu reflexión..." style="margin-bottom: 14px;"></textarea>
    <input type="text" id="modalCategory" placeholder="Categoría" style="margin-bottom: 14px;">
    <input type="text" id="modalImageUrl" placeholder="URL de imagen (opcional)" style="margin-bottom: 24px;">
    <div style="display: flex; gap: 14px; justify-content: flex-end;">
      <button id="cancelModalBtn" style="background:transparent; border:1px solid #cad5e2; padding:10px 24px; border-radius:40px;">Cancelar</button>
      <button id="confirmPublishBtn" class="btn-primary-solid">Publicar →</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR NOMBRE -->
<div id="editNameModal" class="modal-overlay hidden">
  <div class="modal-container">
    <h3 style="margin-bottom: 1rem;">Tu identidad</h3>
    <input type="text" id="newNameInput" placeholder="Nombre público" style="margin-bottom: 24px;">
    <div style="display: flex; gap: 14px; justify-content: flex-end;">
      <button id="closeNameModal" style="background:transparent; border:1px solid #cad5e2; padding:10px 24px; border-radius:40px;">Cancelar</button>
      <button id="saveNameBtn" class="btn-primary-solid">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInAnonymously, onAuthStateChanged, updateProfile } from "firebase/auth";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc, limit, getDocs } from "firebase/firestore";

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",
    authDomain: "vinclechat-564d1.firebaseapp.com",
    projectId: "vinclechat-564d1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let allPosts = [];
  let currentPage = 1;
  const POSTS_PER_PAGE = 15;
  let totalPages = 1;
  let isLoading = true;

  const postsContainer = document.getElementById("postsFeedContainer");
  const paginationDiv = document.getElementById("paginationControls");

  // Autenticación
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        const randomName = "pensador_" + Math.floor(Math.random() * 900 + 100);
        await setDoc(userRef, {
          displayName: randomName,
          createdAt: new Date()
        });
        await updateProfile(user, { displayName: randomName });
      }
      updateUserUI();
      loadTopCreators();
      subscribeToPosts();
    } else {
      try {
        await signInAnonymously(auth);
      } catch(e) {
        console.error("Error auth:", e);
        postsContainer.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> Error de conexión con Firebase. Verifica las reglas de Firestore.</div>`;
      }
    }
  });

  async function getCurrentUserProfile() {
    if (!currentUser) return null;
    const userRef = doc(db, "users", currentUser.uid);
    const snap = await getDoc(userRef);
    if (snap.exists()) return snap.data();
    return { displayName: currentUser.displayName || "Vincleante" };
  }

  async function updateUserUI() {
    if (!currentUser) return;
    const profile = await getCurrentUserProfile();
    const name = profile?.displayName || currentUser.displayName || "Vincleante";
    document.getElementById("displayNameText").innerText = name;
    document.getElementById("userAvatar").innerText = name.charAt(0).toUpperCase();
    document.getElementById("miniAvatar").innerText = name.charAt(0).toUpperCase();
  }

  // Suscripción a posts
  let unsubscribePosts = null;
  function subscribeToPosts() {
    if (unsubscribePosts) unsubscribePosts();
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    
    unsubscribePosts = onSnapshot(q, 
      (snapshot) => {
        allPosts = [];
        snapshot.forEach(docSnap => {
          allPosts.push({ id: docSnap.id, ...docSnap.data() });
        });
        totalPages = Math.max(1, Math.ceil(allPosts.length / POSTS_PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;
        renderCurrentPage();
        renderPagination();
        loadTopCreators();
        isLoading = false;
      },
      (error) => {
        console.error("Error en snapshot:", error);
        postsContainer.innerHTML = `<div class="error-message">
          <i class="fas fa-exclamation-triangle"></i> Error: ${error.message}<br>
          <small>Necesitas configurar reglas de Firestore (ver instrucciones abajo)</small>
        </div>`;
      }
    );
  }

  function renderCurrentPage() {
    if (!postsContainer) return;
    
    if (allPosts.length === 0 && !isLoading) {
      postsContainer.innerHTML = `<div style="background: white; border-radius: 36px; padding: 3rem; text-align: center;">
        <i class="fas fa-feather-alt fa-3x" style="color: #8ba0bc;"></i>
        <p style="margin-top: 16px;">Sé el primero en compartir una reflexión.</p>
      </div>`;
      return;
    }
    
    const start = (currentPage - 1) * POSTS_PER_PAGE;
    const end = start + POSTS_PER_PAGE;
    const pagePosts = allPosts.slice(start, end);
    
    postsContainer.innerHTML = "";
    pagePosts.forEach(post => {
      const isLiked = currentUser && post.likes?.includes(currentUser.uid);
      const timeAgo = getTimeAgo(post.createdAt);
      const card = document.createElement("div");
      card.className = "post-card";
      card.innerHTML = `
        <div class="post-header">
          <div class="avatar">${escapeHtml(post.userDisplayName?.charAt(0) || 'V')}</div>
          <div class="post-user-info">
            <div class="post-user-name">
              ${escapeHtml(post.userDisplayName || "Vincleante")}
              <span class="post-category">${escapeHtml(post.category || "reflexión")}</span>
            </div>
            <div class="post-time">${timeAgo}</div>
          </div>
        </div>
        <div class="post-content">
          ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
          <div class="post-text">${escapeHtml(post.body || '')}</div>
          ${post.imageUrl ? `<div class="post-media"><img src="${post.imageUrl}" alt="imagen" loading="lazy" onerror="this.style.display='none'"></div>` : ''}
        </div>
        <div class="post-actions">
          <button class="action-btn like-btn" data-id="${post.id}">
            <i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart" style="color:${isLiked ? '#d43f34' : '#546e86'}"></i> 
            <span class="like-count">${post.likeCount || 0}</span>
          </button>
          <button class="action-btn"><i class="far fa-comment-dots"></i> Dialogar</button>
        </div>
      `;
      const likeBtn = card.querySelector(".like-btn");
      likeBtn.addEventListener("click", () => toggleLike(post.id, post.likes || []));
      postsContainer.appendChild(card);
    });
  }

  async function toggleLike(postId, currentLikesArray) {
    if (!currentUser) { showToast("Inicia sesión para dar like"); return; }
    const postRef = doc(db, "posts", postId);
    const hasLiked = currentLikesArray.includes(currentUser.uid);
    if (hasLiked) {
      await updateDoc(postRef, {
        likes: arrayRemove(currentUser.uid),
        likeCount: currentLikesArray.length - 1
      });
    } else {
      await updateDoc(postRef, {
        likes: arrayUnion(currentUser.uid),
        likeCount: currentLikesArray.length + 1
      });
    }
  }

  function renderPagination() {
    if (!paginationDiv) return;
    if (totalPages <= 1) { paginationDiv.innerHTML = ""; return; }
    let html = "";
    for (let i = 1; i <= Math.min(totalPages, 8); i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    paginationDiv.innerHTML = html;
    document.querySelectorAll(".page-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentPage = parseInt(btn.dataset.page);
        renderCurrentPage();
        renderPagination();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  async function publishPost(title, body, category, imageUrl) {
    if (!currentUser) { showToast("Autenticando..."); return false; }
    const profile = await getCurrentUserProfile();
    const displayName = profile?.displayName || currentUser.displayName || "Vincleante";
    
    await addDoc(collection(db, "posts"), {
      title: title.trim() || null,
      body: body.trim(),
      category: category.trim() || "idea",
      imageUrl: imageUrl.trim() || null,
      userId: currentUser.uid,
      userDisplayName: displayName,
      createdAt: new Date(),
      likes: [],
      likeCount: 0
    });
    showToast("✨ Reflexión publicada");
    return true;
  }

  async function loadTopCreators() {
    if (!currentUser) return;
    try {
      const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100));
      const snapshot = await getDocs(q);
      const countMap = new Map();
      snapshot.forEach(doc => {
        const name = doc.data().userDisplayName;
        if (name) countMap.set(name, (countMap.get(name) || 0) + 1);
      });
      const sorted = Array.from(countMap.entries()).sort((a,b) => b[1] - a[1]).slice(0,5);
      const container = document.getElementById("topLocalCreators");
      if (sorted.length === 0) { container.innerHTML = "<span>Comparte y aparecerás</span>"; return; }
      let html = "";
      for (let [name, count] of sorted) {
        html += `<div class="creator-item">
          <div class="avatar" style="width:38px;height:38px;font-size:0.9rem;">${name.charAt(0)}</div>
          <div><strong>${escapeHtml(name)}</strong><div style="font-size:11px;">${count} reflexiones</div></div>
        </div>`;
      }
      container.innerHTML = html;
    } catch(e) { console.warn(e); }
  }

  function getTimeAgo(timestamp) {
    if (!timestamp) return "reciente";
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
    if (seconds < 60) return "ahora";
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `hace ${minutes} min`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `hace ${hours} h`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `hace ${days} d`;
    return `hace ${Math.floor(days / 7)} sem`;
  }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function showToast(msg) { const t = document.createElement('div'); t.className='toast-msg'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2500); }

  // Eventos modales
  const createModal = document.getElementById("createModal");
  document.getElementById("openCreatorBtn").addEventListener("click", () => createModal.classList.remove("hidden"));
  document.getElementById("cancelModalBtn").addEventListener("click", () => createModal.classList.add("hidden"));
  document.getElementById("confirmPublishBtn").addEventListener("click", async () => {
    const title = document.getElementById("modalTitle").value;
    const body = document.getElementById("modalBody").value;
    const cat = document.getElementById("modalCategory").value;
    const imgUrl = document.getElementById("modalImageUrl").value;
    if (!body.trim() && !title.trim()) { showToast("Escribe una reflexión o título"); return; }
    await publishPost(title, body, cat, imgUrl);
    createModal.classList.add("hidden");
    document.getElementById("modalTitle").value = "";
    document.getElementById("modalBody").value = "";
    document.getElementById("modalCategory").value = "";
    document.getElementById("modalImageUrl").value = "";
  });

  // Editar nombre
  const editModal = document.getElementById("editNameModal");
  document.getElementById("editProfileBtn").addEventListener("click", async () => {
    const profile = await getCurrentUserProfile();
    document.getElementById("newNameInput").value = profile?.displayName || "";
    editModal.classList.remove("hidden");
  });
  document.getElementById("saveNameBtn").addEventListener("click", async () => {
    const newName = document.getElementById("newNameInput").value.trim();
    if (!newName) return;
    if (currentUser) {
      const userRef = doc(db, "users", currentUser.uid);
      await setDoc(userRef, { displayName: newName }, { merge: true });
      await updateProfile(currentUser, { displayName: newName });
      updateUserUI();
      showToast(`Ahora eres ${newName}`);
    }
    editModal.classList.add("hidden");
  });
  document.getElementById("closeNameModal").addEventListener("click", () => editModal.classList.add("hidden"));
</script>
