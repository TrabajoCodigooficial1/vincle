<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vincle.chat · Reflexiones que conectan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fb; color: #0a1c2f; }
    .app-container { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: rgba(255,255,255,0.98); border-bottom: 1px solid #eef2f8; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #183c4f, #2c6e8f); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo span { font-weight: 500; font-size: 0.85rem; color: #5c6f87; }
    .user-profile { display: flex; align-items: center; gap: 15px; background: #f0f4fa; padding: 6px 20px; border-radius: 60px; }
    .user-avatar { width: 40px; height: 40px; background: #1e3b4a; border-radius: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
    .main-feed { flex: 1; padding: 2rem; display: grid; grid-template-columns: 1fr 320px; gap: 2.5rem; }
    @media (max-width: 880px) { .main-feed { grid-template-columns: 1fr; } .sidebar { display: none; } }
    .posts-section { display: flex; flex-direction: column; gap: 2rem; }
    .post-card { background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.04), 0 0 0 1px #eef3fc; overflow: hidden; transition: transform 0.2s; }
    .post-card:hover { transform: translateY(-2px); }
    .post-header { padding: 1.2rem 1.5rem 0.6rem; display: flex; align-items: center; gap: 14px; }
    .avatar { width: 48px; height: 48px; background: #dce5f0; border-radius: 100%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
    .post-user-name { font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .post-category { background: #eef3fc; padding: 4px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; color: #22668d; }
    .post-time { font-size: 0.7rem; color: #7c8ba0; margin-top: 4px; }
    .post-content { padding: 0.5rem 1.5rem 1.2rem; }
    .post-title { font-size: 1.5rem; font-weight: 700; margin: 0.6rem 0; }
    .post-text { color: #1f2e45; font-size: 1rem; margin: 0.8rem 0; white-space: pre-wrap; line-height: 1.6; }
    .post-media { margin: 1rem 0; border-radius: 24px; text-align: center; background: #f2f6fb; }
    .post-media img { max-width: 100%; max-height: 400px; object-fit: contain; border-radius: 24px; }
    .post-actions { padding: 0.8rem 1.5rem 1.2rem; border-top: 1px solid #eff3fa; display: flex; gap: 2rem; }
    .action-btn { background: none; border: none; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 500; color: #546e86; cursor: pointer; padding: 6px 12px; border-radius: 40px; }
    .action-btn:hover { background: #f0f4fa; }
    .create-card { background: white; border-radius: 36px; padding: 1.2rem 1.5rem; cursor: pointer; }
    .create-header { display: flex; align-items: center; gap: 14px; }
    .mini-avatar { width: 46px; height: 46px; background: #1e3b4a; border-radius: 100%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .fake-input { flex: 1; background: #f3f6fc; border-radius: 60px; padding: 14px 22px; color: #5f7f9a; }
    .pagination-container { display: flex; justify-content: center; gap: 12px; margin-top: 1rem; }
    .page-btn { background: white; border: 1px solid #e2e9f2; padding: 10px 18px; border-radius: 50px; cursor: pointer; }
    .page-btn.active { background: #1e4c66; color: white; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,28,47,0.75); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-container { background: white; width: 90%; max-width: 580px; border-radius: 44px; padding: 2rem; }
    .hidden { display: none; }
    .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a2c3f; color: white; padding: 12px 28px; border-radius: 60px; z-index: 1200; }
    .error-message { background: #fee2e2; color: #991b1b; padding: 1.5rem; border-radius: 24px; text-align: center; }
    .sidebar-card { background: white; border-radius: 32px; padding: 1.6rem; margin-bottom: 1.8rem; }
    .sidebar-title { font-weight: 700; margin-bottom: 1.2rem; border-left: 4px solid #2c6e8f; padding-left: 14px; }
    .topic-chip { display: inline-block; background: #eef2fa; border-radius: 40px; padding: 6px 18px; margin: 6px 6px 0 0; font-size: 0.75rem; }
    input, textarea { font-family: 'Inter', sans-serif; border: 1px solid #e2e9f2; border-radius: 24px; padding: 12px 18px; width: 100%; font-size: 0.95rem; margin-bottom: 14px; }
    .btn-primary-solid { background: #1e4c66; border: none; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }
    .loading-spinner { text-align: center; padding: 3rem; color: #6c86a3; }
  </style>
</head>
<body>
<div class="app-container">
  <header class="header">
    <div class="logo-area"><div class="logo">Vincle<span>.chat</span></div></div>
    <div class="user-profile" id="userProfileBar">
      <div class="user-avatar" id="userAvatar">V</div>
      <div><div class="user-name" id="displayNameText">Pensador</div>
      <button id="editProfileBtn" style="background:none;border:none;font-size:0.75rem;color:#4f7a9e;cursor:pointer;"><i class="fas fa-pen"></i> nombre</button></div>
    </div>
  </header>
  <div class="main-feed">
    <div class="posts-section">
      <div class="create-card" id="openCreatorBtn">
        <div class="create-header">
          <div class="mini-avatar" id="miniAvatar">V</div>
          <div class="fake-input"><i class="fas fa-feather-alt"></i> Comparte una reflexión...</div>
        </div>
      </div>
      <div id="postsFeedContainer"><div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Conectando con Firebase...</div></div>
      <div id="paginationControls" class="pagination-container"></div>
    </div>
    <aside class="sidebar">
      <div class="sidebar-card"><div class="sidebar-title"><i class="fas fa-brain"></i> Tópicos</div><div><span class="topic-chip">#filosofía</span><span class="topic-chip">#neurociencia</span><span class="topic-chip">#creatividad</span></div></div>
      <div class="sidebar-card"><div class="sidebar-title"><i class="fas fa-fire"></i> Mentes activas</div><div id="topLocalCreators">Cargando...</div></div>
    </aside>
  </div>
</div>

<div id="createModal" class="modal-overlay hidden">
  <div class="modal-container">
    <h3 style="margin-bottom:1.2rem;"><i class="fas fa-lightbulb"></i> Nueva reflexión</h3>
    <input type="text" id="modalTitle" placeholder="Título (opcional)">
    <textarea id="modalBody" rows="4" placeholder="Escribe tu reflexión..."></textarea>
    <input type="text" id="modalCategory" placeholder="Categoría">
    <input type="text" id="modalImageUrl" placeholder="URL de imagen (opcional)">
    <div style="display:flex; gap:14px; justify-content:flex-end;">
      <button id="cancelModalBtn" style="background:transparent; border:1px solid #cad5e2; padding:10px 24px; border-radius:40px;">Cancelar</button>
      <button id="confirmPublishBtn" class="btn-primary-solid">Publicar →</button>
    </div>
  </div>
</div>

<div id="editNameModal" class="modal-overlay hidden">
  <div class="modal-container">
    <h3 style="margin-bottom:1rem;">Tu identidad</h3>
    <input type="text" id="newNameInput" placeholder="Nombre público">
    <div style="display:flex; gap:14px; justify-content:flex-end;">
      <button id="closeNameModal" style="background:transparent; border:1px solid #cad5e2; padding:10px 24px; border-radius:40px;">Cancelar</button>
      <button id="saveNameBtn" class="btn-primary-solid">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInAnonymously, onAuthStateChanged, updateProfile } from "firebase/auth";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, arrayRemove, getDoc, setDoc, getDocs, limit as limitQuery } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",
    authDomain: "vinclechat-564d1.firebaseapp.com",
    projectId: "vinclechat-564d1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let allPosts = [];
  let currentPage = 1;
  const POSTS_PER_PAGE = 15;

  const postsContainer = document.getElementById("postsFeedContainer");
  const paginationDiv = document.getElementById("paginationControls");

  // Mostrar error detallado
  function showError(message, details = "") {
    postsContainer.innerHTML = `<div class="error-message">
      <i class="fas fa-exclamation-triangle"></i><br>
      <strong>${message}</strong><br>
      <small style="display:block; margin-top:10px;">${details}</small>
      <button onclick="location.reload()" style="margin-top:15px; padding:8px 20px; background:#1e4c66; color:white; border:none; border-radius:40px;">Reintentar</button>
    </div>`;
  }

  // Autenticación
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      const userRef = doc(db, "users", user.uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) {
        const randomName = "pensador_" + Math.floor(Math.random() * 900 + 100);
        await setDoc(userRef, { displayName: randomName, createdAt: new Date() });
        await updateProfile(user, { displayName: randomName });
      }
      updateUserUI();
      loadTopCreators();
      subscribeToPosts();
    } else {
      try {
        await signInAnonymously(auth);
      } catch(e) {
        showError("Error de autenticación", "Verifica que la Autenticación Anónima esté activada en Firebase Console → Authentication → Sign-in methods → Anónimo");
      }
    }
  });

  async function getCurrentUserProfile() {
    if (!currentUser) return null;
    const snap = await getDoc(doc(db, "users", currentUser.uid));
    return snap.exists() ? snap.data() : { displayName: currentUser.displayName || "Vincleante" };
  }

  async function updateUserUI() {
    if (!currentUser) return;
    const profile = await getCurrentUserProfile();
    const name = profile?.displayName || "Vincleante";
    document.getElementById("displayNameText").innerText = name;
    document.getElementById("userAvatar").innerText = name.charAt(0).toUpperCase();
    document.getElementById("miniAvatar").innerText = name.charAt(0).toUpperCase();
  }

  function subscribeToPosts() {
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, 
      (snapshot) => {
        allPosts = [];
        snapshot.forEach(docSnap => {
          allPosts.push({ id: docSnap.id, ...docSnap.data() });
        });
        const totalPages = Math.max(1, Math.ceil(allPosts.length / POSTS_PER_PAGE));
        if (currentPage > totalPages) currentPage = totalPages;
        renderCurrentPage();
        renderPagination();
        loadTopCreators();
      },
      (error) => {
        console.error("Firestore error:", error);
        if (error.code === "permission-denied") {
          showError("Error de permisos en Firestore", 
            "Debes configurar las reglas de Firestore:\n\n" +
            "1. Ve a Firebase Console → Firestore Database → Rules\n" +
            "2. Pega estas reglas:\n\n" +
            'rules_version = "2";\n' +
            'service cloud.firestore {\n' +
            '  match /databases/{database}/documents {\n' +
            '    match /{document=**} {\n' +
            '      allow read, write: if true;\n' +
            '    }\n' +
            '  }\n' +
            '}\n\n' +
            "3. Haz clic en 'Publicar'");
        } else {
          showError("Error de conexión: " + error.message, "Verifica tu conexión a internet y que el proyecto Firebase esté activo.");
        }
      }
    );
  }

  function renderCurrentPage() {
    if (!postsContainer) return;
    if (allPosts.length === 0) {
      postsContainer.innerHTML = `<div style="background:white; border-radius:36px; padding:3rem; text-align:center;"><i class="fas fa-feather-alt fa-3x" style="color:#8ba0bc;"></i><p style="margin-top:16px;">Sé el primero en compartir una reflexión.</p></div>`;
      return;
    }
    const start = (currentPage - 1) * POSTS_PER_PAGE;
    const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);
    postsContainer.innerHTML = "";
    pagePosts.forEach(post => {
      const isLiked = currentUser && post.likes?.includes(currentUser.uid);
      const timeAgo = getTimeAgo(post.createdAt);
      const card = document.createElement("div");
      card.className = "post-card";
      card.innerHTML = `
        <div class="post-header">
          <div class="avatar">${escapeHtml(post.userDisplayName?.charAt(0) || 'V')}</div>
          <div><div class="post-user-name">${escapeHtml(post.userDisplayName || "Vincleante")}<span class="post-category">${escapeHtml(post.category || "reflexión")}</span></div>
          <div class="post-time">${timeAgo}</div></div>
        </div>
        <div class="post-content">
          ${post.title ? `<div class="post-title">${escapeHtml(post.title)}</div>` : ''}
          <div class="post-text">${escapeHtml(post.body || '')}</div>
          ${post.imageUrl ? `<div class="post-media"><img src="${post.imageUrl}" loading="lazy" onerror="this.style.display='none'"></div>` : ''}
        </div>
        <div class="post-actions">
          <button class="action-btn like-btn" data-id="${post.id}"><i class="fa-${isLiked ? 'solid' : 'regular'} fa-heart"></i> <span>${post.likeCount || 0}</span></button>
          <button class="action-btn"><i class="far fa-comment-dots"></i> Dialogar</button>
        </div>
      `;
      card.querySelector(".like-btn").addEventListener("click", () => toggleLike(post.id, post.likes || []));
      postsContainer.appendChild(card);
    });
  }

  async function toggleLike(postId, currentLikes) {
    if (!currentUser) return;
    const hasLiked = currentLikes.includes(currentUser.uid);
    await updateDoc(doc(db, "posts", postId), {
      likes: hasLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid),
      likeCount: hasLiked ? currentLikes.length - 1 : currentLikes.length + 1
    });
  }

  function renderPagination() {
    const totalPages = Math.ceil(allPosts.length / POSTS_PER_PAGE);
    if (totalPages <= 1) { paginationDiv.innerHTML = ""; return; }
    let html = "";
    for (let i = 1; i <= Math.min(totalPages, 8); i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }
    paginationDiv.innerHTML = html;
    document.querySelectorAll(".page-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentPage = parseInt(btn.dataset.page);
        renderCurrentPage();
        renderPagination();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  async function publishPost(title, body, category, imageUrl) {
    if (!currentUser) return false;
    const profile = await getCurrentUserProfile();
    await addDoc(collection(db, "posts"), {
      title: title.trim() || null,
      body: body.trim(),
      category: category.trim() || "idea",
      imageUrl: imageUrl.trim() || null,
      userId: currentUser.uid,
      userDisplayName: profile?.displayName || "Vincleante",
      createdAt: new Date(),
      likes: [],
      likeCount: 0
    });
    showToast("✨ Reflexión publicada");
    return true;
  }

  async function loadTopCreators() {
    try {
      const snapshot = await getDocs(query(collection(db, "posts"), limitQuery(100)));
      const countMap = new Map();
      snapshot.forEach(doc => {
        const name = doc.data().userDisplayName;
        if (name) countMap.set(name, (countMap.get(name) || 0) + 1);
      });
      const sorted = Array.from(countMap.entries()).sort((a,b) => b[1] - a[1]).slice(0,5);
      const container = document.getElementById("topLocalCreators");
      if (sorted.length === 0) { container.innerHTML = "<span>Comparte y aparecerás</span>"; return; }
      container.innerHTML = sorted.map(([name, count]) => `<div class="creator-item"><div class="avatar" style="width:38px;height:38px;font-size:0.9rem;">${name.charAt(0)}</div><div><strong>${escapeHtml(name)}</strong><div style="font-size:11px;">${count} reflexiones</div></div></div>`).join("");
    } catch(e) {}
  }

  function getTimeAgo(timestamp) {
    if (!timestamp) return "reciente";
    const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
    const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
    if (seconds < 60) return "ahora";
    const minutes = Math.floor(seconds / 60);
    if (minutes < 60) return `hace ${minutes} min`;
    const hours = Math.floor(minutes / 60);
    if (hours < 24) return `hace ${hours} h`;
    const days = Math.floor(hours / 24);
    if (days < 7) return `hace ${days} d`;
    return `hace ${Math.floor(days / 7)} sem`;
  }

  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  function showToast(msg) { const t = document.createElement('div'); t.className='toast-msg'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 2500); }

  // Eventos modales
  document.getElementById("openCreatorBtn").onclick = () => document.getElementById("createModal").classList.remove("hidden");
  document.getElementById("cancelModalBtn").onclick = () => document.getElementById("createModal").classList.add("hidden");
  document.getElementById("confirmPublishBtn").onclick = async () => {
    await publishPost(
      document.getElementById("modalTitle").value,
      document.getElementById("modalBody").value,
      document.getElementById("modalCategory").value,
      document.getElementById("modalImageUrl").value
    );
    document.getElementById("createModal").classList.add("hidden");
    document.getElementById("modalTitle").value = "";
    document.getElementById("modalBody").value = "";
    document.getElementById("modalCategory").value = "";
    document.getElementById("modalImageUrl").value = "";
  };

  const editModal = document.getElementById("editNameModal");
  document.getElementById("editProfileBtn").onclick = async () => {
    const profile = await getCurrentUserProfile();
    document.getElementById("newNameInput").value = profile?.displayName || "";
    editModal.classList.remove("hidden");
  };
  document.getElementById("saveNameBtn").onclick = async () => {
    const newName = document.getElementById("newNameInput").value.trim();
    if (newName && currentUser) {
      await setDoc(doc(db, "users", currentUser.uid), { displayName: newName }, { merge: true });
      await updateProfile(currentUser, { displayName: newName });
      updateUserUI();
      showToast(`Ahora eres ${newName}`);
    }
    editModal.classList.add("hidden");
  };
  document.getElementById("closeNameModal").onclick = () => editModal.classList.add("hidden");
</script>
</body>
</html>
