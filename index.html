<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>vincle.chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #1a1a1a;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

img {
  width: 100%;
  border-radius: 10px;
  margin-top: 10px;
}

.tag {
  background: #333;
  padding: 5px 10px;
  border-radius: 20px;
  margin: 3px;
  display: inline-block;
  font-size: 12px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>💖 vincle.chat</header>

<div class="container">

<div class="topbar">
  <div id="userInfo">No conectado</div>
  <button onclick="login()">Login</button>
</div>

<div id="form" class="card" style="display:none;">
  <input id="name" placeholder="Nombre de tu amigo/a">
  <input id="photo" placeholder="URL foto">
  <textarea id="desc" placeholder="¿Por qué es increíble?"></textarea>
  <input id="tags" placeholder="Tags (coma)">
  <button onclick="addProfile()">Publicar</button>
</div>

<div id="profiles"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_CONFIG_AQUI",
  authDomain: "TU_CONFIG_AQUI",
  projectId: "TU_CONFIG_AQUI",
  storageBucket: "TU_CONFIG_AQUI",
  messagingSenderId: "TU_CONFIG_AQUI",
  appId: "TU_CONFIG_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

window.login = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  currentUser = user;

  if (user) {
    document.getElementById("userInfo").innerText = user.displayName;
    document.getElementById("form").style.display = "block";
  } else {
    document.getElementById("userInfo").innerText = "No conectado";
    document.getElementById("form").style.display = "none";
  }
});

window.addProfile = async () => {
  if (!currentUser) return alert("Login primero");

  const name = document.getElementById("name").value;
  const photo = document.getElementById("photo").value;
  const desc = document.getElementById("desc").value;
  const tags = document.getElementById("tags").value.split(",");

  if (!name) return alert("Falta nombre");

  await addDoc(collection(db, "profiles"), {
    name,
    photo,
    desc,
    tags,
    likes: 0,
    creator: currentUser.displayName,
    uid: currentUser.uid
  });
};

window.likeProfile = async (id) => {
  await updateDoc(doc(db, "profiles", id), {
    likes: increment(1)
  });
};

onSnapshot(collection(db, "profiles"), (snapshot) => {
  const container = document.getElementById("profiles");
  container.innerHTML = "";

  snapshot.forEach(docSnap => {
    const p = docSnap.data();
    const id = docSnap.id;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <h3>${p.name}</h3>
      <small>Subido por ${p.creator}</small>
      ${p.photo ? `<img src="${p.photo}">` : ""}
      <p>${p.desc}</p>
      <div>${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
      <p>❤️ ${p.likes}</p>
      <button onclick="likeProfile('${id}')">Me interesa</button>
    `;

    container.appendChild(el);
  });
});
</script>

</body>
</html>
