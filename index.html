<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>vincle.chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
}

header {
  padding: 15px;
  text-align: center;
  font-weight: 600;
  background: white;
  border-bottom: 1px solid #ddd;
}

.container {
  max-width: 900px;
  margin: auto;
}

.filters {
  display: flex;
  gap: 8px;
  padding: 10px;
  overflow-x: auto;
}

.filters input {
  padding: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
  font-size: 13px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 8px;
  width: 100%;
  margin-top: 5px;
}

.like {
  background: #007aff;
  color: white;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007aff;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal {
  position: fixed;
  inset: 0;
  background: white;
  padding: 20px;
  display: none;
  overflow-y: auto;
}

.modal input, .modal textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}
</style>
</head>

<body>

<header>💖 vincle.chat</header>

<div class="container">

<div class="filters">
  <input id="fLocation" placeholder="Ubicación">
  <input id="fAge" placeholder="Edad max">
  <input id="fHeight" placeholder="Altura min">
</div>

<div id="profiles" class="grid"></div>

</div>

<div class="fab" onclick="openForm()">+</div>

<div id="modal" class="modal">
  <h2>Sube a tu amigo 😏</h2>

  <input id="creator" placeholder="Tu nombre">
  <input id="name" placeholder="Nombre">
  <input id="age" placeholder="Edad">
  <input id="height" placeholder="Altura cm">
  <input id="location" placeholder="Ubicación">
  <input id="phone" placeholder="Teléfono (ej: 34600000000)">
  <input id="photo" placeholder="URL foto">
  <textarea id="desc" placeholder="Descripción"></textarea>
  <input id="tags" placeholder="Tags">

  <button onclick="addProfile()">Publicar</button>
  <button onclick="closeForm()">Cerrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_CONFIG_AQUI",
  authDomain: "TU_CONFIG_AQUI",
  projectId: "TU_CONFIG_AQUI",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ID local
let userId = localStorage.getItem("vincle_user") || Math.random();
localStorage.setItem("vincle_user", userId);

// UI
window.openForm = () => modal.style.display = "block";
window.closeForm = () => modal.style.display = "none";

// añadir perfil
window.addProfile = async () => {
  const data = {
    creator: creator.value,
    name: name.value,
    age: parseInt(age.value),
    height: parseInt(height.value),
    location: location.value,
    phone: phone.value,
    photo: photo.value,
    desc: desc.value,
    tags: tags.value.split(","),
    likes: 0,
    likedBy: [],
    createdAt: Date.now()
  };

  if (!data.name || !data.creator) {
    alert("Faltan datos");
    return;
  }

  await addDoc(collection(db, "profiles"), data);

  closeForm();
};

// like
window.likeProfile = async (id, likedBy) => {
  if (likedBy.includes(userId)) return alert("Ya diste like");

  await updateDoc(doc(db, "profiles", id), {
    likes: increment(1),
    likedBy: [...likedBy, userId]
  });
};

// filtros
function applyFilters(data) {
  return data.filter(p => {
    return (!fLocation.value || p.location?.toLowerCase().includes(fLocation.value.toLowerCase()))
      && (!fAge.value || p.age <= parseInt(fAge.value))
      && (!fHeight.value || p.height >= parseInt(fHeight.value));
  });
}

// render
onSnapshot(collection(db, "profiles"), (snap) => {
  let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  data = applyFilters(data);

  profiles.innerHTML = "";

  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "card";

    const whatsappLink = p.phone 
      ? `https://wa.me/${p.phone}?text=Hola!%20He%20visto%20tu%20perfil%20en%20vincle.chat`
      : null;

    el.innerHTML = `
      <img src="${p.photo || ''}">
      <div class="card-content">
        <b>${p.name}</b> (${p.age || ""})
        <div>${p.location || ""}</div>
        <div>${p.height || ""} cm</div>
        <div>❤️ ${p.likes}</div>

        <button class="like" onclick='likeProfile("${p.id}", ${JSON.stringify(p.likedBy)})'>
          Me interesa
        </button>

        ${whatsappLink ? `
          <a href="${whatsappLink}" target="_blank">
            <button class="whatsapp">WhatsApp</button>
          </a>
        ` : ""}
      </div>
    `;

    profiles.appendChild(el);
  });
});

// filtros live
[fLocation, fAge, fHeight].forEach(input => {
  input.oninput = () => {
    onSnapshot(collection(db, "profiles"), () => {});
  };
});
</script>

</body>
</html>
