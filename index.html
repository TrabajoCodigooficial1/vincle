<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#007aff">
<meta name="description" content="vincle.chat – Presenta a tus amigos solteros y conecta con personas reales de forma divertida y segura.">
<title>vincle.chat · Conecta con personas reales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
  background: radial-gradient(circle at 10% 20%, rgba(245, 247, 250, 1) 0%, rgba(230, 235, 245, 1) 100%);
  padding-bottom: 100px;
  color: #1c1c1e;
  min-height: 100vh;
}

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}
::-webkit-scrollbar-track {
  background: #e5e5ea;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: #007aff;
  border-radius: 10px;
}

header {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(0, 0, 0, 0.04);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 18px 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.02);
}

.header-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(145deg, #007aff, #5856d6);
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 8px 18px rgba(0,122,255,0.2);
}

.header-main .logo {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #007aff, #5e5ce0, #af52de);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.header-subtitle {
  text-align: center;
  font-size: 0.85rem;
  color: #6c6c70;
  margin-top: 10px;
  font-weight: 500;
  background: rgba(255,255,240,0.5);
  display: inline-block;
  padding: 4px 18px;
  border-radius: 60px;
  backdrop-filter: blur(4px);
}

/* Stats bar premium */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 42px;
  padding: 14px 24px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(20px);
  margin: 20px 24px;
  border-radius: 80px;
  box-shadow: 0 12px 28px -8px rgba(0,0,0,0.08);
  border: 1px solid rgba(255,255,255,0.7);
}

.stat-item {
  text-align: center;
  position: relative;
}
.stat-item:not(:last-child)::after {
  content: '';
  position: absolute;
  right: -22px;
  top: 50%;
  transform: translateY(-50%);
  width: 1px;
  height: 34px;
  background: linear-gradient(to bottom, transparent, #c6c6c8, transparent);
}
.stat-value {
  font-weight: 800;
  font-size: 1.8rem;
  background: linear-gradient(145deg, #1c1c1e, #007aff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  line-height: 1;
}
.stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #8e8e93;
  margin-top: 5px;
  text-transform: uppercase;
}

.container {
  max-width: 1300px;
  margin: 0 auto;
}

/* Grid cards ultra premium */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 28px;
  padding: 20px 28px;
}

.card {
  background: rgba(255,255,255,0.96);
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 35px -12px rgba(0,0,0,0.12);
  transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(2px);
}

.card:hover {
  transform: translateY(-12px);
  box-shadow: 0 28px 48px -12px rgba(0,122,255,0.25);
  border-color: rgba(0,122,255,0.3);
}

.card-image-wrapper {
  position: relative;
  overflow: hidden;
  background: linear-gradient(145deg, #a0a9ff, #6c5ce7);
}
.card img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  transition: transform 0.6s ease;
}
.card:hover img {
  transform: scale(1.06);
}

.like-badge {
  position: absolute;
  top: 18px;
  right: 18px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(12px);
  padding: 6px 16px;
  border-radius: 60px;
  color: white;
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 2;
  letter-spacing: -0.2px;
  font-weight: 600;
}
.like-badge::before {
  content: "🔥";
  font-size: 14px;
}

.card-content {
  padding: 22px 22px 26px;
}

.creator-badge {
  background: #f2f2f7;
  padding: 6px 14px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #007aff;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
  backdrop-filter: blur(4px);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 6px;
}
.card-header h3 {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(145deg, #1c1c1e, #3a3a44);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
}
.age-tag {
  background: linear-gradient(145deg, #007aff20, #5856d620);
  padding: 5px 14px;
  border-radius: 40px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #007aff;
}

.info-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  margin: 12px 0;
  font-size: 0.85rem;
  font-weight: 500;
  color: #5c5c5e;
}
.info-row span {
  display: flex;
  align-items: center;
  gap: 6px;
}

.desc-text {
  font-size: 0.88rem;
  color: #3a3a3e;
  line-height: 1.45;
  margin: 14px 0;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  background: #f8f9fc;
  padding: 10px 14px;
  border-radius: 24px;
}

.tags-container {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 12px 0;
}
.tag {
  background: linear-gradient(120deg, #eef2ff, #e0e7ff);
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 0.7rem;
  font-weight: 600;
  color: #2563eb;
  transition: all 0.2s;
}
.tag:hover {
  background: #007aff;
  color: white;
  transform: scale(0.96);
}

.date-info {
  font-size: 0.65rem;
  color: #aaa;
  margin: 10px 0 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.buttons-group {
  display: flex;
  gap: 12px;
  margin-top: 18px;
}
.btn {
  flex: 1;
  border: none;
  border-radius: 60px;
  padding: 12px 8px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}
.btn-like {
  background: linear-gradient(115deg, #ff3b30, #ff8c6b);
  color: white;
  box-shadow: 0 6px 14px rgba(255,59,48,0.3);
}
.btn-like:hover {
  transform: translateY(-3px);
  filter: brightness(1.05);
  box-shadow: 0 12px 20px rgba(255,59,48,0.4);
}
.btn-wa {
  background: #25d366;
  color: white;
  box-shadow: 0 4px 12px rgba(37,211,102,0.25);
}
.btn-wa:hover {
  background: #1da15b;
  transform: translateY(-3px);
}
.btn-wa:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}

/* FAB interactivo */
.fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: linear-gradient(145deg, #007aff, #5e5ce0);
  color: white;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  font-size: 36px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 12px 28px rgba(0,122,255,0.5);
  transition: all 0.3s ease;
  z-index: 99;
  border: none;
  font-weight: 300;
}
.fab:hover {
  transform: scale(1.08) rotate(90deg);
  background: linear-gradient(145deg, #005fcc, #4945c0);
  box-shadow: 0 20px 32px rgba(0,122,255,0.6);
}

/* Modal elegante */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(18px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  padding: 20px;
}
.modal-content {
  background: rgba(255,255,255,0.98);
  border-radius: 56px;
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 36px 32px;
  animation: floatUp 0.4s ease;
  box-shadow: 0 32px 64px rgba(0,0,0,0.2);
}
@keyframes floatUp {
  from { opacity: 0; transform: translateY(50px) scale(0.96);}
  to { opacity: 1; transform: translateY(0) scale(1);}
}
.modal-content h2 {
  text-align: center;
  margin-bottom: 28px;
  font-size: 1.9rem;
  background: linear-gradient(135deg, #007aff, #af52de);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 800;
}
.modal-content input, .modal-content textarea, .modal-content select {
  width: 100%;
  margin-bottom: 16px;
  padding: 14px 20px;
  border-radius: 44px;
  border: 1.5px solid #e9e9ef;
  font-family: inherit;
  font-size: 15px;
  transition: all 0.2s;
  background: #ffffff;
}
.modal-content input:focus, .modal-content textarea:focus, .modal-content select:focus {
  border-color: #007aff;
  outline: none;
  box-shadow: 0 0 0 4px rgba(0,122,255,0.15);
  background: white;
}
.modal-buttons {
  display: flex;
  gap: 14px;
  margin-top: 28px;
}
.modal-buttons button {
  flex: 1;
  padding: 14px;
  border-radius: 60px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
}
.btn-primary {
  background: linear-gradient(95deg, #007aff, #5e5ce0);
  color: white;
  box-shadow: 0 4px 12px rgba(0,122,255,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  filter: brightness(1.02);
}
.btn-secondary {
  background: #e9e9ef;
  color: #1c1c1e;
}

.toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  color: white;
  padding: 14px 32px;
  border-radius: 80px;
  font-size: 14px;
  font-weight: 500;
  z-index: 150;
  animation: toastGlide 2.8s forwards;
  pointer-events: none;
  letter-spacing: 0.2px;
  white-space: nowrap;
}
@keyframes toastGlide {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px);}
  15% { opacity: 1; transform: translateX(-50%) translateY(0);}
  85% { opacity: 1;}
  100% { opacity: 0; visibility: hidden;}
}
.skeleton {
  background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
  background-size: 200% 100%;
  animation: shine 1.5s linear infinite;
  border-radius: 40px;
  height: 460px;
}
@keyframes shine {
  to { background-position: -200% 0; }
}
.empty-state {
  text-align: center;
  padding: 80px 20px;
  background: rgba(255,255,245,0.6);
  border-radius: 60px;
  backdrop-filter: blur(8px);
  margin: 40px;
}
@media (max-width: 760px) {
  .grid { padding: 16px; gap: 20px; }
  .stats-bar { margin: 12px 16px; gap: 24px; }
  .fab { width: 60px; height: 60px; font-size: 32px; bottom: 20px; right: 20px; }
  .modal-content { padding: 28px 20px; }
  .toast { white-space: normal; max-width: 85%; font-size: 13px; }
}
</style>
</head>
<body>

<header>
  <div class="header-main">
    <div class="logo-icon">💞</div>
    <span class="logo">vincle.chat</span>
  </div>
  <div style="text-align: center;">
    <div class="header-subtitle">✨ Presenta a tu amig@ · Amor real ✨</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Candidatos</div></div>
  <div class="stat-item"><div class="stat-value" id="statLikes">0</div><div class="stat-label">🔥 Apoyos</div></div>
  <div class="stat-item"><div class="stat-value" id="statToday">0</div><div class="stat-label">Nuevos hoy</div></div>
</div>

<div class="container"><div id="profiles" class="grid"></div></div>
<button class="fab" id="fabBtn">✧</button>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>✨ Recomienda a tu amig@ ✨</h2>
    <input id="creator" placeholder="Tu nombre *" autocomplete="off">
    <input id="name" placeholder="Nombre de tu amig@ *" autocomplete="off">
    <input id="age" placeholder="Edad" type="number">
    <input id="height" placeholder="Altura (cm)" type="number">
    <input id="location" placeholder="Ciudad / Ubicación" autocomplete="off">
    <input id="phone" placeholder="WhatsApp (ej: 34612345678)" autocomplete="off">
    <input id="photo" placeholder="URL de foto (dejar por defecto)">
    <textarea id="desc" rows="2" placeholder="Describe sus hobbies, personalidad, qué busca..."></textarea>
    <input id="tags" placeholder="Tags separados por comas (ej: música, senderismo, café)">
    <div class="modal-buttons">
      <button class="btn-primary" id="publishBtn">📢 Publicar perfil</button>
      <button class="btn-secondary" id="closeModalBtn">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",
  authDomain: "vinclechat-564d1.firebaseapp.com",
  projectId: "vinclechat-564d1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("vincle_user");
if (!userId) { userId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36); localStorage.setItem("vincle_user", userId); }

const profilesDiv = document.getElementById("profiles");
const modal = document.getElementById("modal");
const statTotal = document.getElementById("statTotal");
const statLikes = document.getElementById("statLikes");
const statToday = document.getElementById("statToday");

const creatorInput = document.getElementById("creator");
const nameInput = document.getElementById("name");
const ageInput = document.getElementById("age");
const heightInput = document.getElementById("height");
const locationInput = document.getElementById("location");
const phoneInput = document.getElementById("phone");
const photoInput = document.getElementById("photo");
const descInput = document.getElementById("desc");
const tagsInput = document.getElementById("tags");

let allProfiles = [];
let unsubscribe = null;

function showToast(msg, isErr = false) {
  const t = document.querySelector('.toast');
  if (t) t.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if (isErr) toast.style.background = "rgba(255,69,58,0.95)";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
}

function openModal() { modal.style.display = 'flex'; }
function closeModal() { modal.style.display = 'none'; }

async function addProfile() {
  const creator = creatorInput.value.trim();
  const name = nameInput.value.trim();
  if (!creator || !name) { showToast("❌ Necesitamos tu nombre y el de tu amig@", true); return; }
  let phone = phoneInput.value.trim();
  if (phone && !phone.startsWith("+") && /^\d+$/.test(phone)) phone = "34" + phone;
  const defaultPhoto = "https://i.redd.it/l0ergarfzst61.pngw=500";
  const data = {
    creator, name,
    age: ageInput.value ? parseInt(ageInput.value) : null,
    height: heightInput.value ? parseInt(heightInput.value) : null,
    location: locationInput.value.trim() || "🌍 No especificada",
    phone: phone || null,
    photo: photoInput.value.trim() || defaultPhoto,
    desc: descInput.value.trim() || "✨ Una persona increíble esperando conocerte",
    tags: tagsInput.value.trim() ? tagsInput.value.split(",").map(t => t.trim()).filter(t => t) : ["amistad", "citas"],
    likes: 0,
    likedBy: [],
    createdAt: Date.now()
  };
  try {
    await addDoc(collection(db, "profiles"), data);
    closeModal();
    [creatorInput, nameInput, ageInput, heightInput, locationInput, phoneInput, photoInput, descInput, tagsInput].forEach(i => i.value = "");
    showToast("🎉 ¡Perfil publicado! Ahora a conectar 💘");
  } catch (err) { showToast("Error: " + err.message, true); }
}

async function likeProfile(id, currentLikedBy) {
  if (currentLikedBy.includes(userId)) { showToast("💛 Ya apoyaste este perfil"); return; }
  try {
    await updateDoc(doc(db, "profiles", id), { likes: increment(1), likedBy: [...currentLikedBy, userId] });
    showToast("❤️ ¡Apoyo enviado! Le hará mucha ilusión.");
  } catch (err) { showToast("Error al apoyar", true); }
}

function updateStats(profiles) {
  statTotal.textContent = profiles.length;
  const totalLikes = profiles.reduce((sum, p) => sum + (p.likes || 0), 0);
  statLikes.textContent = totalLikes;
  const today = new Date();
  today.setHours(0,0,0,0);
  const todayCount = profiles.filter(p => p.createdAt && p.createdAt >= today.getTime()).length;
  statToday.textContent = todayCount;
}

function formatDate(ts) {
  if (!ts) return "";
  const date = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - date) / (86400000));
  if (diffDays === 0) return "Hoy mismo";
  if (diffDays === 1) return "Ayer";
  if (diffDays < 7) return `Hace ${diffDays} días`;
  return date.toLocaleDateString();
}

function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

function renderProfiles() {
  updateStats(allProfiles);
  if (!allProfiles.length) {
    profilesDiv.innerHTML = `<div class="empty-state"><div style="font-size:64px;">💖</div><h3>Sin perfiles aún</h3><div>¡Publica a tu amig@ y ayuda a que encuentre el amor!</div></div>`;
    return;
  }
  profilesDiv.innerHTML = "";
  for (const p of allProfiles) {
    const card = document.createElement("div");
    card.className = "card";
    const imgUrl = p.photo?.startsWith("http") ? p.photo : "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400";
    const ageText = p.age ? `${p.age} años` : "✨ edad reservada";
    const heightText = p.height ? `${p.height} cm` : "";
    const locationText = p.location || "📍 en alguna parte";
    const whatsappLink = p.phone ? `https://wa.me/${p.phone.replace(/[^0-9+]/g, '')}?text=Hola!%20Vi%20el%20perfil%20de%20${encodeURIComponent(p.name)}%20en%20vincle.chat%20y%20me%20encantaría%20conocerte%20😍` : null;
    const tagsHtml = p.tags?.length ? `<div class="tags-container">${p.tags.slice(0,5).map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>` : "";
    card.innerHTML = `
      <div class="card-image-wrapper">
        <img src="${imgUrl}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400'">
        <div class="like-badge">${p.likes || 0}</div>
      </div>
      <div class="card-content">
        <div class="creator-badge">🎁 Presentado por: ${escapeHtml(p.creator)}</div>
        <div class="card-header"><h3>${escapeHtml(p.name)}</h3><span class="age-tag">${ageText}</span></div>
        <div class="info-row"><span>📍 ${escapeHtml(locationText)}</span>${heightText ? `<span>📏 ${heightText}</span>` : ""}</div>
        <div class="desc-text">📝 ${escapeHtml(p.desc)}</div>
        ${tagsHtml}
        <div class="date-info">🕊️ ${p.createdAt ? formatDate(p.createdAt) : 'Reciente'}</div>
        <div class="buttons-group">
          <button class="btn btn-like like-btn" data-id="${p.id}" data-likedby='${JSON.stringify(p.likedBy || [])}'>❤️ Me interesa</button>
          ${whatsappLink ? `<a href="${whatsappLink}" target="_blank" rel="noopener noreferrer" style="flex:1"><button class="btn btn-wa">💬 Chatear</button></a>` : '<button class="btn btn-wa" disabled>📱 Sin contacto</button>'}
        </div>
      </div>
    `;
    const likeBtn = card.querySelector('.like-btn');
    likeBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      let likedByArr = [];
      try { likedByArr = JSON.parse(likeBtn.getAttribute('data-likedby')); } catch(e) {}
      likeProfile(p.id, likedByArr);
    });
    profilesDiv.appendChild(card);
  }
}

function startRealtime() {
  if (unsubscribe) unsubscribe();
  const q = query(collection(db, "profiles"), orderBy("createdAt", "desc"));
  profilesDiv.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>`;
  unsubscribe = onSnapshot(q, (snap) => {
    allProfiles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderProfiles();
  }, (err) => {
    console.error(err);
    profilesDiv.innerHTML = `<div class="empty-state"><div>⚠️ Error de conexión</div><div>Revisa Firestore rules</div></div>`;
    showToast("No se pudo cargar la red, intenta recargar", true);
  });
}

function init() {
  startRealtime();
  document.getElementById("fabBtn").onclick = openModal;
  document.getElementById("closeModalBtn").onclick = closeModal;
  document.getElementById("publishBtn").onclick = addProfile;
  modal.onclick = (e) => { if (e.target === modal) closeModal(); };
}
document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
</script>
</body>
</html>
