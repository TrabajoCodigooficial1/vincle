<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>vincle.chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f2f7;
  color: #111;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  font-weight: 600;
  font-size: 18px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
  padding: 12px;
}

.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
  font-size: 13px;
}

.tag {
  font-size: 10px;
  background: #eee;
  padding: 3px 6px;
  border-radius: 10px;
  margin: 2px;
  display: inline-block;
}

button {
  border: none;
  background: #007aff;
  color: white;
  padding: 8px;
  border-radius: 10px;
  width: 100%;
  margin-top: 6px;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007aff;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  font-size: 30px;
  display: flex;
  justify-content: center;
  align-items: center;
}

.modal {
  position: fixed;
  inset: 0;
  background: white;
  padding: 20px;
  display: none;
  overflow-y: auto;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.filters {
  padding: 10px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}
</style>
</head>

<body>

<header>
  vincle.chat 💖
</header>

<div class="filters">
  <input id="filterLocation" placeholder="Ubicación">
  <input id="filterAge" placeholder="Edad max">
  <input id="filterHeight" placeholder="Altura min">
</div>

<div class="grid" id="profiles"></div>

<div class="fab" onclick="openForm()">+</div>

<div class="modal" id="formModal">
  <h2>Sube a tu amigo 😏</h2>
  <input id="creator" placeholder="Tu nombre">
  <input id="name" placeholder="Nombre">
  <input id="age" placeholder="Edad">
  <input id="height" placeholder="Altura (cm)">
  <input id="location" placeholder="Ubicación">
  <input id="phone" placeholder="Teléfono contacto">
  <input id="photo" placeholder="URL foto">
  <textarea id="desc" placeholder="¿Por qué es increíble?"></textarea>
  <input id="tags" placeholder="Tags">
  <button onclick="addProfile()">Publicar</button>
  <button onclick="closeForm()">Cerrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_CONFIG_AQUI",
  authDomain: "TU_CONFIG_AQUI",
  projectId: "TU_CONFIG_AQUI",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ID local
let userId = localStorage.getItem("vincle_user") || Math.random();
localStorage.setItem("vincle_user", userId);

window.openForm = () => {
  document.getElementById("formModal").style.display = "block";
};

window.closeForm = () => {
  document.getElementById("formModal").style.display = "none";
};

window.addProfile = async () => {
  await addDoc(collection(db, "profiles"), {
    creator: creator.value,
    name: name.value,
    age: parseInt(age.value),
    height: parseInt(height.value),
    location: location.value,
    phone: phone.value,
    photo: photo.value,
    desc: desc.value,
    tags: tags.value.split(","),
    likes: 0,
    likedBy: [],
    createdAt: Date.now()
  });

  closeForm();
};

window.likeProfile = async (id, likedBy) => {
  if (likedBy.includes(userId)) return alert("Ya has dado like");

  await updateDoc(doc(db, "profiles", id), {
    likes: increment(1),
    likedBy: [...likedBy, userId]
  });
};

function applyFilters(data) {
  const loc = filterLocation.value.toLowerCase();
  const ageMax = parseInt(filterAge.value);
  const heightMin = parseInt(filterHeight.value);

  return data.filter(p => {
    return (!loc || p.location?.toLowerCase().includes(loc)) &&
           (!ageMax || p.age <= ageMax) &&
           (!heightMin || p.height >= heightMin);
  });
}

onSnapshot(collection(db, "profiles"), (snap) => {
  let data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  data = applyFilters(data);

  profiles.innerHTML = "";

  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <img src="${p.photo || ''}">
      <div class="card-content">
        <b>${p.name}</b> (${p.age})
        <div>${p.location}</div>
        <div>${p.height} cm</div>
        <div>${p.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
        <div>❤️ ${p.likes}</div>
        <button onclick='likeProfile("${p.id}", ${JSON.stringify(p.likedBy)})'>
          Me interesa
        </button>
        <button onclick='alert("Contacto: ${p.phone}")'>
          Contactar
        </button>
      </div>
    `;

    profiles.appendChild(el);
  });
});

// filtros en vivo
filterLocation.oninput = filterAge.oninput = filterHeight.oninput = () => {
  location.reload(); // simple MVP refresh
};
</script>

</body>
</html>
