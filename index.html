<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff7b2c">
<title>vincle.chat · Quedamos & Crew | Planes sociales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
  background: linear-gradient(145deg, #fff9f0 0%, #ffe6d5 100%);
  padding-bottom: 100px;
  color: #2d1b0e;
  min-height: 100vh;
}

::-webkit-scrollbar {
  width: 8px;
}
::-webkit-scrollbar-track {
  background: #ffe0cc;
  border-radius: 10px;
}
::-webkit-scrollbar-thumb {
  background: #ff7b2c;
  border-radius: 10px;
}

header {
  background: rgba(255, 245, 235, 0.96);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255, 123, 44, 0.2);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 16px 20px;
}

.header-main {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.logo-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #ff7b2c, #ffb347);
  border-radius: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: 0 8px 18px rgba(255, 123, 44, 0.3);
}

.logo {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6a1a, #ff9f4a);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.5px;
}

.header-subtitle {
  text-align: center;
  font-size: 0.85rem;
  font-weight: 600;
  background: #ffedd5;
  display: inline-block;
  padding: 6px 20px;
  border-radius: 60px;
  color: #c2410c;
  margin-top: 10px;
}

/* Stats bar */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 14px 24px;
  background: white;
  margin: 20px 24px;
  border-radius: 80px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.05);
  border: 1px solid #ffdec2;
}

.stat-value {
  font-weight: 800;
  font-size: 1.8rem;
  background: linear-gradient(145deg, #ff7b2c, #ffb347);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.stat-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: #9a6a3a;
  text-transform: uppercase;
}

/* Grid */
.container {
  max-width: 1300px;
  margin: 0 auto;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 28px;
  padding: 20px 28px;
}

/* Cards planes */
.card {
  background: white;
  border-radius: 40px;
  overflow: hidden;
  box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
  border: 1px solid rgba(255, 123, 44, 0.2);
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 28px 40px -12px #ff7b2c40;
  border-color: #ff7b2c;
}

.card-image {
  height: 180px;
  background-size: cover;
  background-position: center;
  position: relative;
}
.category-badge {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 6px 14px;
  border-radius: 40px;
  color: white;
  font-weight: 600;
  font-size: 0.7rem;
  display: flex;
  gap: 6px;
}
.attendees-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #ff7b2c;
  padding: 6px 14px;
  border-radius: 40px;
  font-weight: 800;
  color: white;
  font-size: 0.8rem;
  box-shadow: 0 2px 8px black(0,0,0,0.2);
}

.card-content {
  padding: 22px;
}
.creator {
  font-size: 0.7rem;
  color: #ff7b2c;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
}
.card-header h3 {
  font-size: 1.4rem;
  font-weight: 800;
  color: #2d1b0e;
}
.when-where {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #fff7ef;
  padding: 12px;
  border-radius: 24px;
  margin: 12px 0;
  font-size: 0.8rem;
}
.desc {
  font-size: 0.85rem;
  color: #5a3e28;
  margin: 12px 0;
  line-height: 1.4;
}
.places-left {
  font-size: 0.75rem;
  font-weight: 700;
  background: #ffede3;
  display: inline-block;
  padding: 4px 12px;
  border-radius: 30px;
  margin: 8px 0;
}
.btn-group {
  display: flex;
  gap: 12px;
  margin-top: 18px;
}
.btn-join {
  flex: 1;
  background: linear-gradient(105deg, #ff7b2c, #ff9f4a);
  border: none;
  padding: 12px;
  border-radius: 60px;
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}
.btn-join:hover {
  transform: scale(0.97);
  filter: brightness(1.05);
}
.btn-details {
  background: #f0e6dc;
  border: none;
  padding: 12px;
  border-radius: 60px;
  font-weight: 600;
  cursor: pointer;
}

.fab {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: linear-gradient(145deg, #ff7b2c, #ffb347);
  color: white;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  font-size: 34px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 12px 28px #ff7b2c80;
  transition: all 0.2s;
  border: none;
}
.fab:hover {
  transform: scale(1.05);
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 200;
  padding: 20px;
}
.modal-content {
  background: white;
  border-radius: 48px;
  max-width: 560px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 32px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px);}
  to { opacity: 1; transform: translateY(0);}
}
.modal-content h2 {
  font-size: 1.8rem;
  margin-bottom: 24px;
  color: #ff7b2c;
}
.modal-content input, .modal-content textarea, .modal-content select {
  width: 100%;
  margin-bottom: 16px;
  padding: 14px 18px;
  border-radius: 44px;
  border: 1px solid #ffd6ba;
  font-family: inherit;
  background: #fffaf5;
}
.modal-buttons {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}
.btn-primary {
  background: #ff7b2c;
  color: white;
  font-weight: 700;
  border: none;
  padding: 14px;
  border-radius: 44px;
  cursor: pointer;
}
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: #2d1b0e;
  color: white;
  padding: 12px 28px;
  border-radius: 60px;
  z-index: 150;
  animation: fadeToast 2.5s forwards;
}
@keyframes fadeToast {
  0% { opacity: 0; transform: translateX(-50%) translateY(20px);}
  15% { opacity: 1; transform: translateX(-50%) translateY(0);}
  85% { opacity: 1; }
  100% { opacity: 0; visibility: hidden;}
}
.skeleton {
  background: linear-gradient(110deg, #f3e5d5 8%, #ffe6d5 18%, #f3e5d5 33%);
  background-size: 200% 100%;
  animation: loading 1.5s infinite;
  border-radius: 40px;
  height: 460px;
}
@keyframes loading {
  to { background-position: -200% 0; }
}
.empty-state {
  text-align: center;
  padding: 80px;
  background: #fff3e8;
  border-radius: 60px;
}
@media (max-width: 760px) {
  .grid { padding: 16px; }
  .stats-bar { margin: 12px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="header-main">
    <div class="logo-icon">🎉</div>
    <span class="logo">vincle.chat</span>
  </div>
  <div style="text-align: center;"><div class="header-subtitle">🚀 Quedamos & Crew · Haz planes, conoce gente</div></div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="statPlans">0</div><div class="stat-label">Planes activos</div></div>
  <div class="stat-item"><div class="stat-value" id="statApuntados">0</div><div class="stat-label">Apuntados Total</div></div>
  <div class="stat-item"><div class="stat-value" id="statCaducados">0</div><div class="stat-label">Planes Caducados</div></div>

</div>

<div class="container"><div id="plansGrid" class="grid"></div></div>
<button class="fab" id="fabBtn">+</button>

<div id="modal" class="modal">
  <div class="modal-content">
    <h2>📢 Crea un plan social</h2>
    <input id="titlePlan" placeholder="Título del plan * (ej: Pádel el sábado)" autocomplete="off">
    <select id="categoryPlan">
      <option value="⚽ Deporte">⚽ Deporte</option><option value="🎬 Cine">🎬 Cine</option><option value="🎸 Concierto">🎸 Concierto</option>
      <option value="🍜 Cena/Quedada">🍜 Cena/Quedada</option><option value="✈️ Viaje">✈️ Viaje</option><option value="🎮 Gaming">🎮 Gaming</option><option value="📚 Study">📚 Study</option>
    </select>
    <input id="locationPlan" placeholder="Ubicación / Lugar" autocomplete="off">
    <input id="datetimePlan" type="datetime-local" placeholder="Fecha y hora">
    <input id="maxAttendees" type="number" placeholder="Plazas totales (máx 30)" value="8">
    <textarea id="descPlan" rows="2" placeholder="Descripción del plan, qué llevar, etc..."></textarea>
    <input id="contactInfo" placeholder="Teléfono / Grupo (opcional)" autocomplete="off">
    <div class="modal-buttons">
      <button class="btn-primary" id="publishPlanBtn">🚀 Publicar plan</button>
      <button class="btn-primary" id="closeModalBtn" style="background:#ccc; color:#333;">Cancelar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, increment, query, orderBy, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGrspy5R6usV6KMEIsxNb_7P5GuibbX4I",
  authDomain: "vinclechat-564d1.firebaseapp.com",
  projectId: "vinclechat-564d1"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let userId = localStorage.getItem("vincle_user");
if (!userId) { userId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(); localStorage.setItem("vincle_user", userId); }

const plansGrid = document.getElementById("plansGrid");
const modal = document.getElementById("modal");
const statPlans = document.getElementById("statPlans");
const statApuntados = document.getElementById("statApuntados");

const titlePlan = document.getElementById("titlePlan");
const categoryPlan = document.getElementById("categoryPlan");
const locationPlan = document.getElementById("locationPlan");
const datetimePlan = document.getElementById("datetimePlan");
const maxAttendees = document.getElementById("maxAttendees");
const descPlan = document.getElementById("descPlan");
const contactInfo = document.getElementById("contactInfo");

let allPlans = [];
let unsubscribe = null;

function showToast(msg, isErr = false) {
  let t = document.querySelector('.toast');
  if(t) t.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  if(isErr) toast.style.background = "#e03a00";
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2700);
}

function openModal() { modal.style.display = 'flex'; }
function closeModal() { modal.style.display = 'none'; }

async function publishPlan() {
  const title = titlePlan.value.trim();
  if(!title) { showToast("Escribe un título para el plan", true); return; }
  const planData = {
    title: title,
    category: categoryPlan.value,
    location: locationPlan.value.trim() || "Por definir",
    datetime: datetimePlan.value || null,
    maxPlazas: parseInt(maxAttendees.value) || 8,
    desc: descPlan.value.trim() || "¡Apúntate y diviértete!",
    contact: contactInfo.value.trim() || null,
    attendees: [],
    attendeesCount: 0,
    createdBy: userId,
    creatorName: "Usuario",
    createdAt: Date.now()
  };
  if(planData.maxPlazas > 30) planData.maxPlazas = 30;
  try {
    await addDoc(collection(db, "plans"), planData);
    closeModal();
    titlePlan.value = ""; categoryPlan.value = "⚽ Deporte"; locationPlan.value = ""; datetimePlan.value = ""; maxAttendees.value = "8"; descPlan.value = ""; contactInfo.value = "";
    showToast("✨ ¡Plan creado! La gente se apuntará");
  } catch(e) { showToast("Error: "+e.message, true); }
}

async function joinPlan(planId, currentAttendees, maxPlazas, currentCount) {
  if(currentAttendees.includes(userId)) { showToast("Ya estás apuntado a este plan ✅"); return; }
  if(currentCount >= maxPlazas) { showToast("❌ Plan completo, no quedan plazas"); return; }
  try {
    await updateDoc(doc(db, "plans", planId), {
      attendees: arrayUnion(userId),
      attendeesCount: increment(1)
    });
    showToast("🎉 ¡Te has apuntado! El organizador podrá verte");
  } catch(err) { showToast("Error al apuntarte", true); }
}

function updateStats(plans) {
  statPlans.textContent = plans.length;
  const totalApuntados = plans.reduce((sum, p) => sum + (p.attendeesCount || 0), 0);
  statApuntados.textContent = totalApuntados;
}

function formatDate(datetime) {
  if(!datetime) return "Fecha por definir";
  const d = new Date(datetime);
  return d.toLocaleString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function renderPlans() {
  updateStats(allPlans);
  if(!allPlans.length) {
    plansGrid.innerHTML = `<div class="empty-state"><span style="font-size:56px;">🤝</span><h3>Sin planes aún</h3><div>¡Crea el primer plan y queda con gente!</div></div>`;
    return;
  }
  plansGrid.innerHTML = "";
  for(const plan of allPlans) {
    const card = document.createElement("div");
    card.className = "card";
    const catIcon = plan.category.split(" ")[0];
    const imageBg = `url('https://source.unsplash.com/featured/400x180/?${encodeURIComponent(plan.category.split(' ')[0])},meeting')`;
    const placesLeft = (plan.maxPlazas - (plan.attendeesCount || 0));
    const attendeesList = plan.attendeesCount || 0;
    card.innerHTML = `
      <div class="card-image" style="background-image: ${imageBg}; background-size: cover;">
        <div class="category-badge">${plan.category}</div>
        <div class="attendees-badge">👥 ${attendeesList}/${plan.maxPlazas}</div>
      </div>
      <div class="card-content">
        <div class="creator">🎯 Creado por: ${plan.createdBy === userId ? "Tú" : "Alguien del grupo"}</div>
        <div class="card-header"><h3>${escapeHtml(plan.title)}</h3></div>
        <div class="when-where">
          <span>📍 ${escapeHtml(plan.location)}</span>
          <span>📅 ${formatDate(plan.datetime)}</span>
        </div>
        <div class="desc">📝 ${escapeHtml(plan.desc)}</div>
        ${placesLeft > 0 ? `<div class="places-left">✨ Quedan ${placesLeft} plazas libres</div>` : `<div class="places-left" style="background:#ffc2a1;">⚠️ COMPLETO</div>`}
        <div class="btn-group">
          <button class="btn-join" data-id="${plan.id}" data-attendees='${JSON.stringify(plan.attendees || [])}' data-max="${plan.maxPlazas}" data-count="${plan.attendeesCount || 0}">🙌 Me apunto</button>
          ${plan.contact ? `<button class="btn-details" data-contact="${escapeHtml(plan.contact)}">💬 Contactar</button>` : `<button class="btn-details" disabled style="opacity:0.5">📞 Sin contacto</button>`}
        </div>
      </div>
    `;
    const joinBtn = card.querySelector('.btn-join');
    joinBtn?.addEventListener('click', (e) => {
      e.stopPropagation();
      let att = [];
      try { att = JSON.parse(joinBtn.getAttribute('data-attendees')); } catch(e) {}
      const max = parseInt(joinBtn.getAttribute('data-max'));
      const cnt = parseInt(joinBtn.getAttribute('data-count'));
      joinPlan(plan.id, att, max, cnt);
    });
    const contactBtn = card.querySelector('.btn-details:not([disabled])');
    if(contactBtn && plan.contact) {
      contactBtn.addEventListener('click', () => {
        navigator.clipboard?.writeText(plan.contact);
        showToast("📋 Contacto copiado: " + plan.contact);
      });
    }
    plansGrid.appendChild(card);
  }
}

function startRealtime() {
  if(unsubscribe) unsubscribe();
  const q = query(collection(db, "plans"), orderBy("createdAt", "desc"));
  plansGrid.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;
  unsubscribe = onSnapshot(q, (snapshot) => {
    allPlans = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));
    renderPlans();
  }, (err) => {
    console.error(err);
    plansGrid.innerHTML = `<div class="empty-state">⚠️ Error de red, revisa Firestore</div>`;
  });
}

function init() {
  startRealtime();
  document.getElementById("fabBtn").onclick = openModal;
  document.getElementById("closeModalBtn").onclick = closeModal;
  document.getElementById("publishPlanBtn").onclick = publishPlan;
  modal.onclick = (e) => { if(e.target === modal) closeModal(); };
}

function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
</script>
</body>
</html>
