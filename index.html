<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>vincle.chat</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #ff4d6d;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

button {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #e63b5a;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
}

.tag {
  display: inline-block;
  background: #eee;
  padding: 5px 10px;
  margin: 3px;
  border-radius: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>💖 vincle.chat</header>

<div class="container">

  <h2>Sube a tu amigo/a 😏</h2>

  <div class="card">
    <input id="creator" placeholder="Tu nombre (amigo/a creador)">
    <input id="name" placeholder="Nombre de tu amigo/a">
    <input id="photo" placeholder="URL de foto">
    <textarea id="desc" placeholder="¿Por qué es increíble?"></textarea>
    <input id="tags" placeholder="Tags (separados por coma)">
    <button onclick="addProfile()">Publicar</button>
  </div>

  <h2>Personas recomendadas 🔥</h2>

  <div id="profiles"></div>

</div>

<script>
let profiles = [];

function addProfile() {
  const creator = document.getElementById("creator").value;
  const name = document.getElementById("name").value;
  const photo = document.getElementById("photo").value;
  const desc = document.getElementById("desc").value;
  const tags = document.getElementById("tags").value.split(",");

  if (!name || !creator) {
    alert("Completa al menos nombre y creador");
    return;
  }

  profiles.push({
    creator,
    name,
    photo,
    desc,
    tags,
    likes: 0
  });

  renderProfiles();
}

function likeProfile(index) {
  profiles[index].likes++;
  renderProfiles();
}

function renderProfiles() {
  const container = document.getElementById("profiles");
  container.innerHTML = "";

  profiles.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${p.name}</h3>
      <p><strong>Subido por:</strong> ${p.creator}</p>
      ${p.photo ? `<img src="${p.photo}" width="100%" style="border-radius:10px;">` : ""}
      <p>${p.desc}</p>
      <div>${p.tags.map(t => `<span class="tag">${t.trim()}</span>`).join("")}</div>
      <p>❤️ ${p.likes} interesados</p>
      <button onclick="likeProfile(${i})">Me interesa</button>
    `;

    container.appendChild(card);
  });
}
</script>

</body>
</html>
