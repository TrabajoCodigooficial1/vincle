<script>
  // Config Firebase (original)
  const firebaseConfig = {
    apiKey: "AIzaSyXMvncuf1Jhux5dVzDJ_VQe3cw3tIntt",
    authDomain: "vincle-e76dd.firebaseapp.com",
    databaseURL: "https://vincle-e76dd-default-rtdb.firebaseio.com",
    projectId: "vincle-e76dd",
    storageBucket: "vincle-e76dd.firebasestorage.app",
    appId: "1:11807936515:web:ff67d9da38e956ff62cee6"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // helpers
  const randomId = (len = 7) => {
    const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
    let result = "";
    for (let i = 0; i < len; i++) result += chars[Math.floor(Math.random() * chars.length)];
    return result;
  };

  const COLORS = ["#60a5fa", "#34d399", "#f97316", "#f472b6", "#a78bfa", "#ff6b6b"];
  const EMOJIS = ["🔷","🔶","✨","⚡","🌸","🍃","🌊","🎧","💎","🔥"];
  const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

  const sessionColor = sessionStorage.getItem("vincle_color") || rand(COLORS);
  const sessionEmoji = sessionStorage.getItem("vincle_emoji") || rand(EMOJIS);
  sessionStorage.setItem("vincle_color", sessionColor);
  sessionStorage.setItem("vincle_emoji", sessionEmoji);

  // DOM bindings
  const get = id => document.getElementById(id);
  const roomInput = get("roomInput");
  const createBtn = get("createBtn");
  const copyLinkBtn = get("copyLinkBtn");
  const messagesContainer = get("messagesContainer");
  const messageInput = get("messageInput");
  const sendBtn = get("sendMessageBtn");
  const roomIdDisplay = get("roomIdDisplay");
  const myEmojiSpan = get("myEmoji");
  const myColorSpan = get("myColor");
  const clearLocalBtn = get("clearLocalBtn");
  const randomRoomBtn = get("randomRoomBtn");
  const shareRoomBtn = get("shareRoomBtn");
  const newRoomHeaderBtn = get("newRoomHeaderBtn");
  const copyRoomIdIcon = get("copyRoomIdIcon");
  const onlineCountSpan = get("onlineCount");
  const liveUsersBadge = get("liveUsersBadge");
  const expiryLabel = get("expiryLabel");

  myEmojiSpan.textContent = sessionEmoji;
  myColorSpan.style.background = sessionColor;

  let currentRoom = "";
  let currentListener = null;
  let presenceCleanup = null;

  function getRoomRef() { return db.ref("rooms/" + currentRoom + "/messages"); }
  function getPresenceRef() { return db.ref("rooms/" + currentRoom + "/presence"); }

  function escapeHtml(str) { 
    let div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return "Ahora";
    if (diff < 3600000) return `${Math.floor(diff / 60000)} min`;
    if (diff < 86400000) return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    return d.toLocaleDateString([], { day:'numeric', month:'short' });
  }

  function addMessageToUI(msg, isMine) {
    const div = document.createElement("div");
    div.className = `message-item ${isMine ? "mine" : "other"}`;
    div.innerHTML = `
      <div class="bubble">
        <div class="sender-row">
          <span>${msg.emoji || "👤"}</span>
          <strong>${isMine ? "Tú" : "Anónimo"}</strong>
        </div>
        <div class="message-text">${escapeHtml(msg.text)}</div>
        <div class="message-time">${formatTime(msg.ts)}</div>
      </div>
    `;
    messagesContainer.appendChild(div);
    setTimeout(() => messagesContainer.scrollTop = messagesContainer.scrollHeight, 50);
  }

  function listenMessages() {
    if (currentListener) currentListener();
    messagesContainer.innerHTML = `
      <div class="message-item other"><div class="bubble"><div class="sender-row"><span>🔒</span> Sistema</div><div class="message-text">Nueva sala: <strong>${currentRoom}</strong>. Privacidad total.</div><div class="message-time">Ahora</div></div></div>
    `;
    const ref = getRoomRef();
    currentListener = ref.orderByChild("ts").limitToLast(100).on("child_added", snap => {
      const m = snap.val();
      if (!m || (m.expiry && Date.now() > m.expiry)) return;
      const isMine = (m.color === sessionColor && m.emoji === sessionEmoji);
      addMessageToUI(m, isMine);
    });
  }

  function setupPresence() {
    if (presenceCleanup) presenceCleanup();
    const presenceRef = getPresenceRef();
    const key = randomId(6);
    const presenceData = { color: sessionColor, emoji: sessionEmoji, lastSeen: Date.now(), key };
    presenceRef.child(key).set(presenceData);
    presenceRef.child(key).onDisconnect().remove();

    const interval = setInterval(() => {
      presenceRef.child(key).update({ lastSeen: Date.now() });
      presenceRef.once("value", snap => {
        let active = 0;
        const now = Date.now();
        snap.forEach(ch => { if (ch.val() && now - (ch.val().lastSeen || 0) < 15000) active++; });
        onlineCountSpan.innerText = active;
        liveUsersBadge.innerText = active;
      });
    }, 4000);
    presenceCleanup = () => { clearInterval(interval); presenceRef.child(key).remove(); presenceRef.off(); };
  }

  function setActiveRoom(roomId) {
    if (currentRoom === roomId && currentListener) return;
    if (presenceCleanup) presenceCleanup();
    currentRoom = roomId;
    roomIdDisplay.innerText = roomId;
    roomInput.value = roomId;
    localStorage.setItem("vincle_room", roomId);
    const url = new URL(window.location);
    url.searchParams.set("room", roomId);
    window.history.replaceState({}, "", url);
    expiryLabel.innerText = "24h";
    listenMessages();
    setupPresence();
  }

  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    const now = Date.now();
    const payload = {
      text: text,
      color: sessionColor,
      emoji: sessionEmoji,
      ts: now,
      expiry: now + (24 * 3600000)
    };
    getRoomRef().push(payload);
    messageInput.value = "";
    messageInput.style.height = "auto";
  }

  // UI Events
  createBtn.addEventListener("click", () => {
    let newId = roomInput.value.trim();
    if (!newId) newId = randomId(7);
    setActiveRoom(newId);
  });
  copyLinkBtn.addEventListener("click", () => {
    const link = `${window.location.origin}${window.location.pathname}?room=${currentRoom}`;
    navigator.clipboard.writeText(link).then(() => alert("Enlace copiado"));
  });
  copyRoomIdIcon.addEventListener("click", () => {
    navigator.clipboard.writeText(currentRoom);
    copyRoomIdIcon.textContent = "✅";
    setTimeout(() => copyRoomIdIcon.textContent = "📋", 1500);
  });
  sendBtn.addEventListener("click", sendMessage);
  messageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  messageInput.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
  });
  clearLocalBtn.addEventListener("click", () => {
    if (confirm("Eliminar solo la vista local? Los mensajes remotos permanecen")) {
      messagesContainer.innerHTML = `<div class="message-item other"><div class="bubble"><div class="sender-row"><span>🧹</span> Sistema</div><div class="message-text">Chat local limpiado</div><div class="message-time">Ahora</div></div></div>`;
    }
  });
  randomRoomBtn.addEventListener("click", () => setActiveRoom(randomId(7)));
  newRoomHeaderBtn.addEventListener("click", () => setActiveRoom(randomId(7)));
  shareRoomBtn.addEventListener("click", () => {
    const url = window.location.href;
    if (navigator.share) navigator.share({ title: "VINCLE", url });
    else navigator.clipboard.writeText(url).then(() => alert("Enlace copiado"));
  });
  // mobile drawer
  const menuToggle = get("menuToggleBtn");
  const sideDrawer = get("sideDrawer");
  const overlay = get("menuOverlay");
  function closeDrawer() { sideDrawer.classList.remove("open"); overlay.classList.remove("active"); }
  menuToggle?.addEventListener("click", () => {
    sideDrawer.classList.toggle("open");
    overlay.classList.toggle("active");
  });
  overlay?.addEventListener("click", closeDrawer);
  // init room
  const urlRoom = new URLSearchParams(window.location.search).get("room");
  const initialRoom = urlRoom || localStorage.getItem("vincle_room") || randomId(7);
  setActiveRoom(initialRoom);
  setTimeout(() => messageInput.focus(), 200);
</script>
</body>
</html>
